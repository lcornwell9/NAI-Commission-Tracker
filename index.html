<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAI Red — Commission Tracker</title>
<style>
:root{--navy:#1a3a5c;--navy-dark:#122840;--navy-light:#2a4a6c;--red:#C8102E;--red-dark:#a00d25;--gold:#D4AF37;--gold-light:#f0d060;--success:#16a34a;--success-bg:#dcfce7;--warning:#d97706;--warning-bg:#fef3c7;--danger:#dc2626;--danger-bg:#fee2e2;--muted:#6b7280;--border:#e5e7eb;--bg:#f8fafc;--surface:#ffffff;--text:#111827;--text-sm:#374151;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 10px 25px rgba(0,0,0,.15);--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-light) 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:var(--shadow-lg);text-align:center}
.login-card img{height:60px;margin-bottom:24px}
.login-card h2{font-size:20px;color:var(--navy);margin-bottom:6px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:28px}
.login-field{margin-bottom:16px;text-align:left}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--text-sm);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-field select,.login-field input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none}
.login-field select:focus,.login-field input:focus{border-color:var(--navy)}
.login-error{color:var(--red);font-size:13px;margin-bottom:12px;min-height:18px}
.btn-login{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer}
.btn-login:hover{background:var(--red-dark)}
#app{display:none;min-height:100vh}
nav{background:var(--navy);display:flex;align-items:center;padding:0 20px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.nav-logo{height:32px;margin-right:28px;flex-shrink:0}
.nav-links{display:flex;gap:2px;flex:1}
.nav-link{padding:6px 14px;border-radius:6px;color:rgba(255,255,255,.75);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-link.active{background:rgba(255,255,255,.15);color:#fff}
.nav-user{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-user-name{color:rgba(255,255,255,.85);font-size:13px}
.btn-logout{padding:5px 12px;border:1px solid rgba(255,255,255,.3);border-radius:6px;color:rgba(255,255,255,.8);font-size:12px;cursor:pointer;background:none}
.btn-logout:hover{background:rgba(255,255,255,.1);color:#fff}
main{padding:24px;max-width:1400px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;color:var(--navy)}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:var(--navy)}
.card-body{padding:18px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.summary-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px 18px}
.summary-card .label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.summary-card .value{font-size:22px;font-weight:700;color:var(--navy)}
.summary-card .value.red{color:var(--red)}
.summary-card .value.green{color:var(--success)}
.summary-card .sub{font-size:11px;color:var(--muted);margin-top:4px}
.table-wrap{overflow-x:auto}
.table-wrap-sticky{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:12px;white-space:nowrap;position:sticky;top:0;z-index:3}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:#f9fafb}
td{padding:9px 12px;vertical-align:middle}
.td-mono{font-variant-numeric:tabular-nums;text-align:right}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:var(--danger-bg);color:var(--danger)}
.badge-partial{background:var(--warning-bg);color:var(--warning)}
.badge-complete{background:var(--success-bg);color:var(--success)}
.badge-active{background:var(--success-bg);color:var(--success)}
.badge-inactive{background:#f3f4f6;color:var(--muted)}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;background:#f3f4f6;font-size:11px;font-weight:500;color:var(--text-sm)}
.tier-badge{background:var(--gold);color:#7a5700;font-weight:700;padding:2px 8px;border-radius:20px;font-size:11px}
.broker-perf-card.tier-80{border-color:#16a34a}
.broker-perf-card.tier-80 .tier-badge{background:#16a34a;color:#fff}
.broker-perf-card.tier-80 .progress-fill{background:linear-gradient(90deg,#16a34a,#4ade80)}
.broker-perf-card.tier-80 .bname{color:#15803d}
.broker-perf-card.tier-70{border-color:#7c3aed}
.broker-perf-card.tier-70 .tier-badge{background:#7c3aed;color:#fff}
.broker-perf-card.tier-70 .progress-fill{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.broker-perf-card.tier-70 .bname{color:#6d28d9}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;white-space:nowrap}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-dark)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-dark)}
.btn-ghost{background:transparent;color:var(--text-sm);border:1px solid var(--border)}.btn-ghost:hover{background:#f3f4f6}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:5px;border-radius:6px;background:transparent;border:none;cursor:pointer;color:var(--muted)}
.btn-icon:hover{background:#f3f4f6;color:var(--text)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-sm);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;font-family:var(--font)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy)}
.form-group textarea{resize:vertical;min-height:72px}
.form-row{display:grid;gap:14px}
.cols-2{grid-template-columns:1fr 1fr}
.cols-3{grid-template-columns:1fr 1fr 1fr}
.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-input{padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;min-width:220px}
.search-input:focus{border-color:var(--navy)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.expand-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 6px;border-radius:4px}
.expand-btn:hover{color:var(--navy);background:#f3f4f6}
.sub-row{background:#f8fafc}
.sub-row td{font-size:12px;padding:7px 12px}
.sub-header td{background:#eef2f7;font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.hidden{display:none}
.broker-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:12px}
.broker-perf-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px}
.broker-perf-card .bname{font-size:15px;font-weight:700;color:var(--navy)}
.broker-perf-card .bmeta{font-size:12px;color:var(--muted);margin:2px 0 10px}
.progress-bar{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin-bottom:3px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px}
.progress-label{font-size:11px;color:var(--muted)}
.broker-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.broker-stat{text-align:center;padding:8px;background:#f8fafc;border-radius:6px}
.broker-stat .s-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.broker-stat .s-value{font-size:13px;font-weight:700;color:var(--navy);margin-top:2px}
.broker-stat .s-value.orange{color:var(--warning)}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:18px;margin-top:18px}
.chart-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px}
.chart-card h3{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:14px}
.pdf-drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px}
.pdf-drop-zone:hover,.pdf-drop-zone.drag-over{border-color:var(--red);background:#fff5f5;color:var(--red)}
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:14px}
.alert-info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.alert-warning{background:var(--warning-bg);color:var(--warning);border:1px solid #fcd34d}
.alert-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5}
.alert-success{background:var(--success-bg);color:var(--success);border:1px solid #86efac}
hr.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.section-title{font-size:15px;font-weight:700;color:var(--navy);margin:20px 0 12px}
.report-header{background:var(--navy);color:#fff;padding:18px 22px}
.report-header h2{font-size:17px;font-weight:700}
.report-header p{font-size:12px;opacity:.8;margin-top:3px}
.tx-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.tx-summary-item{background:#f8fafc;border-radius:var(--radius);border:1px solid var(--border);padding:10px 14px}
.tx-summary-item .si-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.tx-summary-item .si-value{font-size:18px;font-weight:700;color:var(--navy);margin-top:2px}
.tx-summary-item .si-sub{font-size:11px;color:var(--muted);margin-top:2px}
.monthly-table th:nth-child(n+2){text-align:right;min-width:84px}
.monthly-table td:nth-child(n+2){text-align:right}
.monthly-table .top-cell{background:#fffbeb;font-weight:600;color:var(--warning)}
.monthly-table tfoot td{font-weight:700;background:var(--navy);color:#fff;text-align:right}
.monthly-table tfoot td:first-child{text-align:left}
.cur-month-hdr{background:var(--red)!important;color:#fff!important}
.settings-section{margin-bottom:28px}
.settings-section h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.adv-toggle{color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;background:none;border:none;padding:0}
.team-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);margin-left:4px}
.edited-meta{font-size:10px;color:var(--muted);font-style:italic}
.reconcile-match{color:var(--success)}
.reconcile-miss{color:var(--danger);font-weight:600}
.recon-row-miss td{background:#fff5f5}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <img id="login-logo" src="" alt="NAI Red">
    <h2>Commission Tracker</h2>
    <p>Sign in to continue</p>
    <div class="login-field">
      <label>Who are you?</label>
      <select id="login-user">
        <option value="">— Select —</option>
        <option value="Lauren">Lauren</option>
        <option value="David">David</option>
      </select>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="app">
  <nav>
    <img id="nav-logo" class="nav-logo" src="" alt="NAI Red">
    <div class="nav-links">
      <button class="nav-link" onclick="navigate('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="navigate('transactions')">Transactions</button>
      <button class="nav-link" onclick="navigate('brokers')">Brokers</button>
      <button class="nav-link" onclick="navigate('reports')">Reports</button>
      <button class="nav-link" onclick="navigate('settings')">Settings</button>
    </div>
    <div class="nav-user">
      <span id="sync-dot" title="Gist sync status" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6b7280;margin-right:8px;flex-shrink:0;transition:background .4s"></span>
      <span class="nav-user-name" id="nav-username"></span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>
  <main id="main-content"></main>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

function resolveBrokerName(raw) {
  if (!raw) return null;
  const key = raw.trim().toLowerCase();
  if (key in BROKER_ALIASES) {
    const canonical = BROKER_ALIASES[key];
    if (!canonical) return null; // NAI Red etc — skip
    // Get or create the broker by canonical name so imports always resolve correctly
    // Case-insensitive so "Mcqueen" matches canonical "McQueen"
    let b = state.brokers.find(x => x.name.toLowerCase() === canonical.toLowerCase());
    if (!b) { b = {id:makeId(), name:canonical, active:true, createdAt:new Date().toISOString()}; state.brokers.push(b); }
    else if (b.name !== canonical) b.name = canonical; // fix capitalisation in-place
    return b;
  }
  return state.brokers.find(b => b.name.toLowerCase() === key) || null;
}

function makeId() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function fmtD(n) { if (n == null || isNaN(n)) return '$0.00'; return '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtNum(n) { return (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s) { if (!s) return '—'; try { const d=new Date(s+'T12:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e){return s;} }
function fiscalYearOf(dateStr) { if (!dateStr) return null; return new Date(dateStr+'T12:00:00').getFullYear(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayISO() { return new Date().toISOString().slice(0,10); }
function lastDayOfMonth(year, month) { return new Date(year, month, 0).toISOString().slice(0,10); }

async function hashPass(pw) {
  const data = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ============================================================
// SPLIT CALCULATION (running YTD tier logic)
// ============================================================
function getBrokerOverridePct(brokerId) {
  if (!brokerId) return null;
  const b = state.brokers.find(b => b.id === brokerId);
  return (b && b.customSplitPct != null) ? b.customSplitPct : null;
}

function calcSplit(ytdBefore, amount, overridePct) {
  // If broker has a custom fixed split, bypass tiers entirely
  if (overridePct != null) {
    const brokerAmount  = Math.round(amount * overridePct / 100 * 100) / 100;
    const companyAmount = Math.round((amount - brokerAmount) * 100) / 100;
    return { brokerAmount, companyAmount, effectiveSplit: overridePct + '%/' + (100 - overridePct) + '%' };
  }
  const tiers = getTiers().sort((a,b) => a.upTo - b.upTo);
  let remaining = amount, brokerAmount = 0, companyAmount = 0, runYtd = ytdBefore;

  for (let i = 0; i < tiers.length; i++) {
    if (remaining <= 0) break;
    const tierFloor = i === 0 ? 0 : tiers[i-1].upTo;
    const tierCeil  = tiers[i].upTo;
    if (runYtd >= tierCeil) continue;
    const roomInTier = tierCeil - Math.max(runYtd, tierFloor);
    const inThisTier = Math.min(remaining, roomInTier);
    brokerAmount  += inThisTier * tiers[i].brokerPct;
    companyAmount += inThisTier * tiers[i].companyPct;
    remaining  -= inThisTier;
    runYtd     += inThisTier;
  }
  if (remaining > 0) {
    const last = tiers[tiers.length-1];
    brokerAmount  += remaining * last.brokerPct;
    companyAmount += remaining * last.companyPct;
  }
  const effectivePct = amount > 0 ? brokerAmount / amount : 0;
  const bPct = Math.round(effectivePct*100);
  const effectiveSplit = bPct + '%/' + (100-bPct) + '%';
  return { brokerAmount: Math.round(brokerAmount*100)/100, companyAmount: Math.round(companyAmount*100)/100, effectiveSplit };
}

function getCurrentTierLabel(ytd) {
  const tiers = getTiers().sort((a,b) => a.upTo - b.upTo);
  for (const t of tiers) {
    if (ytd < t.upTo) return Math.round(t.brokerPct*100) + '%/' + Math.round(t.companyPct*100) + '%';
  }
  const last = tiers[tiers.length-1];
  return Math.round(last.brokerPct*100) + '%/' + Math.round(last.companyPct*100) + '%';
}

function getNextTierThreshold(ytd) {
  const tiers = getTiers().sort((a,b) => a.upTo - b.upTo);
  for (const t of tiers) {
    if (ytd < t.upTo && t.upTo !== Infinity) return t.upTo;
  }
  return null;
}

function getTxStatus(tx) {
  if (!tx.payments || tx.payments.length === 0) return 'pending';
  const all = tx.payments.length;
  const rec = tx.payments.filter(p => p.status === 'received').length;
  if (rec === 0) return 'pending';
  if (rec === all) return 'complete';
  return 'partial';
}

function getTxBrokerLabel(tx) {
  if (!tx.team || tx.team.length === 0) {
    const b = state.brokers.find(b => b.id === tx.brokerId);
    return b ? b.name : 'Unknown';
  }
  return tx.team.map(m => { const b = state.brokers.find(b => b.id === m.brokerId); return b ? b.name : '?'; }).join('/');
}

function getTxBrokerIds(tx) {
  if (!tx.team || tx.team.length === 0) return tx.brokerId ? [tx.brokerId] : [];
  return tx.team.map(m => m.brokerId).filter(Boolean);
}

// Get running YTD gross for a broker UP TO (but not including) a specific payment
function getBrokerRunningYtd(brokerId, year, beforePaymentId) {
  const allPmts = [];
  for (const tx of state.transactions) {
    const brokerIds = getTxBrokerIds(tx);
    if (!brokerIds.includes(brokerId)) continue;
    for (const pmt of tx.payments) {
      if (pmt.status !== 'received') continue;
      if (fiscalYearOf(pmt.receivedDate) !== year) continue;
      // For team deals, use this broker's share of the payment
      let share = 1;
      if (tx.team && tx.team.length > 0) {
        const member = tx.team.find(m => m.brokerId === brokerId);
        share = member ? (member.pct / 100) : 0;
      }
      allPmts.push({ paymentId: pmt.id, amount: pmt.amount * share, date: pmt.receivedDate || '' });
    }
  }
  allPmts.sort((a,b) => a.date.localeCompare(b.date));
  let ytd = 0;
  for (const p of allPmts) {
    if (p.paymentId === beforePaymentId) break;
    ytd += p.amount;
  }
  return ytd;
}

// Get all-brokers YTD stats for a given year (for dashboard/reports)
function getBrokerYtdStats(brokerId, year) {
  let ytdGross=0, ytdBrokerNet=0, ytdCompanyNet=0, pendingAR=0, txValue=0, txCount=0;
  const seenTx = new Set();

  const allPmts = [];
  for (const tx of state.transactions) {
    const brokerIds = getTxBrokerIds(tx);
    if (!brokerIds.includes(brokerId)) continue;
    for (const pmt of tx.payments) {
      if (pmt.status === 'pending') {
          // Use brokerId tag if present, otherwise apply team share
          if (pmt.brokerId) { if (pmt.brokerId === brokerId) pendingAR += pmt.amount; }
          else {
            let ps = 1;
            if (tx.team && tx.team.length > 0) { const m=tx.team.find(mm=>mm.brokerId===brokerId); ps=m?m.pct/100:1; }
            pendingAR += pmt.amount * ps;
          }
        }
      if (pmt.status === 'received' && fiscalYearOf(pmt.receivedDate) === year) {
        let share = 1;
        if (tx.team && tx.team.length > 0) {
          const member = tx.team.find(m => m.brokerId === brokerId);
          share = member ? (member.pct / 100) : 0;
        }
        // Use exact per-broker amount if stored, otherwise use share%
        let effectiveShare;
        if (pmt.brokerAmounts) {
          const ba = pmt.brokerAmounts.find(ba=>ba.brokerId===brokerId);
          effectiveShare = ba !== undefined ? ba.amount / pmt.amount : 0; // absent = $0
        } else {
          effectiveShare = share;
        }
        allPmts.push({ tx, pmt, share: effectiveShare, date: pmt.receivedDate || '' });
      }
    }
    if (!seenTx.has(tx.id) && brokerIds.includes(brokerId)) {
      seenTx.add(tx.id); txCount++;
      let share = 1;
      if (tx.team && tx.team.length > 0) {
        const member = tx.team.find(m => m.brokerId === brokerId);
        share = member ? (member.pct / 100) : 0;
      }
      txValue += (tx.transactionValue || 0) * share;
    }
  }
  allPmts.sort((a,b) => a.date.localeCompare(b.date));
  let runYtd = 0;
  for (const { pmt, share } of allPmts) {
    const gross = pmt.amount * share;
    const split = calcSplit(runYtd, gross, getBrokerOverridePct(brokerId));
    ytdGross     += gross;
    ytdBrokerNet += split.brokerAmount;
    ytdCompanyNet += split.companyAmount;
    runYtd       += gross;
  }
  return { ytdGross, ytdBrokerNet, ytdCompanyNet, pendingAR, txCount, txValue };
}

// ============================================================
// CLOUD SYNC (JSONBin.io — no GitHub tokens, no revocation)
// ============================================================
let _saving = false;
async function saveToGist() {
  if (_saving) return false;
  _saving = true;
  state._lastSaved = new Date().toISOString();
  saveLocalCache();
  updateGistStatus('saving');
  const binId = localStorage.getItem('ct-cloud-gistid') || BIN_ID;
  const binKey = localStorage.getItem('ct-cloud-token') || BIN_KEY;
  if (!binId || !binKey) { updateGistStatus('error'); _saving = false; return false; }
  let success = false;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + binId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': binKey },
      body: JSON.stringify(state),
    });
    if (r.ok) { updateGistStatus('ok'); success = true; }
    else {
      const body = await r.text().catch(()=>'');
      console.warn('JSONBin save error:', r.status, body);
      updateGistStatus('error');
      _saving = false;
      return { ok: false, status: r.status, body };
    }
  } catch(e) { console.warn('JSONBin save failed:', e); updateGistStatus('error'); _saving = false; return { ok: false, status: 0, body: e.message }; }
  _saving = false;
  return { ok: true };
}

function saveLocalCache() {
  try {
    // Strip token from cached settings — token lives ONLY in ct-cloud-token, never in state
    const settingsToCache = { ...state.settings, gistToken: undefined };
    localStorage.setItem('ct-data', JSON.stringify({
      transactions: state.transactions,
      brokers: state.brokers,
      settings: settingsToCache
    }));
  } catch(e) { console.warn('localStorage save failed:', e); }
}

function updateGistStatus(status) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  if (status === 'ok')      { dot.style.background = '#22c55e'; dot.title = 'Synced to cloud'; }
  else if (status === 'saving') { dot.style.background = '#f59e0b'; dot.title = 'Saving…'; }
  else if (status === 'error')  { dot.style.background = '#ef4444'; dot.title = 'Cloud sync failed — data saved locally'; }
  else if (status === 'warning'){ dot.style.background = '#f59e0b'; dot.title = 'Local data is newer than cloud — re-syncing'; }
}

async function loadFromGist() {
  const binId  = localStorage.getItem('ct-cloud-gistid') || BIN_ID;
  const binKey = localStorage.getItem('ct-cloud-token')  || BIN_KEY;
  if (!binId || !binKey) { updateGistStatus('error'); return false; }
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
      headers: { 'X-Master-Key': binKey },
    });
    if (!r.ok) { updateGistStatus('error'); return false; }
    const data = await r.json();
    const loaded = data.record;
    if (!loaded) return false;
    const cloudTime = loaded._lastSaved || '1970-01-01';
    const localTime = state._lastSaved  || '1970-01-01';
    const localHasData = (state.transactions || []).length > 0;

    if (!localHasData || cloudTime >= localTime) {
      const user = state.currentUser;
      state = { ...loaded, currentUser: user, currentPage: state.currentPage, dashYear: loaded.dashYear || state.dashYear };
      state.settings.gistToken = undefined;
      if (!state.settings.tiers) state.settings.tiers = JSON.parse(JSON.stringify(DEFAULT_TIERS.map(t => ({...t, upTo: t.upTo === Infinity ? null : t.upTo}))));
      saveLocalCache();
      updateGistStatus('ok');
    } else {
      // Local is NEWER than Gist — keep local, re-push to Gist to catch it up
      console.warn('Local data is newer than Gist — re-syncing to cloud.');
      updateGistStatus('warning');
      saveToGist();
    }
    return true;
  } catch(e) { console.warn('Gist load failed:', e); updateGistStatus('error'); return false; }
}

// ============================================================
// AUTH
// ============================================================
async function doLogin() {
  const user = document.getElementById('login-user').value;
  const pw   = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  if (!user) { errEl.textContent = 'Please select a user.'; return; }
  if (!pw)   { errEl.textContent = 'Please enter your password.'; return; }
  errEl.textContent = 'Signing in…';

  const hash   = await hashPass(pw);
  const stored = getLocalPasswordHash(user);

  if (!stored) {
    // First login on this device — accept any password and save locally
    setLocalPasswordHash(user, hash);
    finishLogin(user);
    return;
  }
  if (hash !== stored) { errEl.textContent = 'Incorrect password.'; return; }
  finishLogin(user);
}

function getLocalPasswordHash(user) {
  try {
    const d = JSON.parse(localStorage.getItem('ct-passwords') || '{}');
    return d[user] || null;
  } catch(e) { return null; }
}

function setLocalPasswordHash(user, hash) {
  try {
    const d = JSON.parse(localStorage.getItem('ct-passwords') || '{}');
    d[user] = hash;
    localStorage.setItem('ct-passwords', JSON.stringify(d));
  } catch(e) {}
}

function finishLogin(user) {
  state.currentUser = user;
  try { localStorage.setItem('ct-session', user); } catch(e) {}
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('nav-username').textContent = user;
  document.getElementById('nav-logo').src = LOGO_WHITE_NAV;
  navigate(state.currentPage || 'dashboard');
}

function doLogout() {
  state.currentUser = null;
  try { localStorage.removeItem('ct-session'); } catch(e) {}
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
}

let _chartInstances = {};
function destroyChart(id) { if (_chartInstances[id]) { _chartInstances[id].destroy(); delete _chartInstances[id]; } }

function renderDashboard(mc) {
  const year = state.dashYear || new Date().getFullYear();
  const availYears = getAvailableYears();

  // Compute summary stats
  let ytdTxValue=0, totalPendingAR=0, ytdGrossRec=0, ytdBrokerNet=0, ytdCompanyNet=0;

  // Running YTD per broker for accurate tier calc
  const brokerRunYtd = {};
  const allRecPmts = [];
  for (const tx of state.transactions) {
    const brokerIds = getTxBrokerIds(tx);
    for (const pmt of tx.payments) {
      if (pmt.status === 'pending') totalPendingAR += pmt.amount;
      if (pmt.status === 'received' && fiscalYearOf(pmt.receivedDate) === year) {
        for (const bid of brokerIds) {
          let share = 1;
          if (tx.team && tx.team.length > 0) {
            const m = tx.team.find(m => m.brokerId === bid);
            share = m ? m.pct/100 : 0;
          }
          // Use exact per-broker amount when available (same logic as reconciliation)
          let exactGross;
          if (pmt.brokerAmounts) {
            const ba = pmt.brokerAmounts.find(ba => ba.brokerId === bid);
            exactGross = ba ? ba.amount : 0;
          } else {
            exactGross = pmt.amount * share;
          }
          if (exactGross > 0 || !pmt.brokerAmounts) {
            allRecPmts.push({ tx, pmt, brokerId: bid, gross: exactGross, date: pmt.receivedDate||'' });
          }
        }
      }
    }
  }
  allRecPmts.sort((a,b) => a.date.localeCompare(b.date));

  const seenTxForValue = new Set();
  for (const { tx, pmt, brokerId, gross } of allRecPmts) {
    if (!brokerRunYtd[brokerId]) brokerRunYtd[brokerId] = 0;
    const split = calcSplit(brokerRunYtd[brokerId], gross, getBrokerOverridePct(brokerId));
    ytdGrossRec   += gross;
    ytdBrokerNet  += split.brokerAmount;
    ytdCompanyNet += split.companyAmount;
    brokerRunYtd[brokerId] += gross;
    if (!seenTxForValue.has(tx.id)) { seenTxForValue.add(tx.id); ytdTxValue += (tx.transactionValue||0); }
  }

  // Transaction summary counts (deduplicated by address+client)
  const seen = new Map();
  for (const tx of state.transactions) {
    const key = (tx.propertyAddress||'').toLowerCase().trim() + '|||' + (tx.clientName||'').toLowerCase().trim();
    if (!seen.has(key)) seen.set(key, tx);
  }
  const uniqueTxs = [...seen.values()];
  const yearTxs = uniqueTxs.filter(tx => {
    const txYear = tx.fiscalYear || fiscalYearOf(tx.closingDate) || fiscalYearOf(tx.createdAt);
    return txYear === year;
  });

  function countBy(arr, fn) { return arr.filter(fn).length; }
  const types = ['Retail','Industrial','Office','Special Purpose','Land'];

  // Monthly gross for table
  const monthlyByBroker = {};
  const monthlyTotals = Array(12).fill(0);
  const topProducer = Array(12).fill(null);
  const brokerMonthly = {};

  for (const tx of state.transactions) {
    const brokerIds = getTxBrokerIds(tx);
    for (const pmt of tx.payments) {
      if (pmt.status !== 'received' || fiscalYearOf(pmt.receivedDate) !== year) continue;
      const m = new Date(pmt.receivedDate+'T12:00:00').getMonth();
      for (const bid of brokerIds) {
        let share = 1;
        if (tx.team && tx.team.length > 0) {
          const member = tx.team.find(mm => mm.brokerId === bid);
          share = member ? member.pct/100 : 0;
        }
        if (!brokerMonthly[bid]) brokerMonthly[bid] = Array(12).fill(0);
        brokerMonthly[bid][m] += pmt.amount * share;
        monthlyTotals[m] += pmt.amount * share;
      }
    }
  }
  for (let m = 0; m < 12; m++) {
    let best = null, bestAmt = 0;
    for (const [bid, months] of Object.entries(brokerMonthly)) {
      if (months[m] > bestAmt) { bestAmt = months[m]; best = bid; }
    }
    topProducer[m] = best;
  }

  const curMonth = new Date().getMonth();
  const yearOpts = availYears.map(y => `<option value="${y}"${y===year?' selected':''}>${y}</option>`).join('');

  mc.innerHTML = `
  <div class="page-header">
    <div class="page-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;color:var(--muted)">Year:</label>
      <select onchange="state.dashYear=parseInt(this.value);renderDashboard(document.getElementById('main-content'))" style="padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">${yearOpts}</select>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card"><div class="label">Gross Received</div><div class="value">${fmtD(ytdGrossRec)}</div><div class="sub">YTD ${year}</div></div>
    <div class="summary-card"><div class="label">Broker Net Paid</div><div class="value">${fmtD(ytdBrokerNet)}</div><div class="sub">YTD ${year}</div></div>
    <div class="summary-card"><div class="label">Company Net</div><div class="value">${fmtD(ytdCompanyNet)}</div><div class="sub">YTD ${year}</div></div>
    <div class="summary-card"><div class="label">Pending AR</div><div class="value orange">${fmtD(totalPendingAR)}</div><div class="sub">All-time carryover</div></div>
    <div class="summary-card"><div class="label">Transactions</div><div class="value">${yearTxs.length}</div><div class="sub">in ${year}</div></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Transaction Summary</div></div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap"><table id="tx-summary"></table></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Broker Performance</div></div>
    <div class="card-body">
      <div class="broker-cards" id="broker-cards"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">Monthly Gross Commission</div></div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap"><table id="monthly-table" class="monthly-table"></table></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:20px">
    <div class="card"><div class="card-header"><div class="card-title">Monthly Gross Trend</div></div><div class="card-body"><canvas id="chart-monthly" height="200"></canvas></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Broker Gross Commissions</div></div><div class="card-body"><canvas id="chart-broker-gross" height="200"></canvas></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Company Net by Broker</div></div><div class="card-body"><canvas id="chart-company-pie" height="200"></canvas></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Broker Net by Broker</div></div><div class="card-body"><canvas id="chart-broker-pie" height="200"></canvas></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Commission by Property Type</div></div><div class="card-body"><canvas id="chart-type-pie" height="200"></canvas></div></div>
  </div>`;

  // ── TX SUMMARY
  const isLease  = t => (t.leaseSale||'').toLowerCase().includes('lease');
  const isSale   = t => (t.leaseSale||'').toLowerCase().includes('sale');
  const isBOV    = t => (t.leaseSale||'') === 'BOV';
  const isRefFee = t => (t.leaseSale||'') === 'Referral Fee';
  const leases = countBy(yearTxs, isLease);
  const sales  = countBy(yearTxs, isSale);
  const bovs   = countBy(yearTxs, isBOV);
  const refs   = countBy(yearTxs, isRefFee);
  const knownTotal = leases + sales + bovs + refs;
  let summaryHtml = '<thead><tr><th>Type</th><th>Leases</th><th>Sales</th><th>BOV</th><th>Referral Fee</th><th>Total</th></tr></thead><tbody>';
  for (const tp of types) {
    const tpTxs   = yearTxs.filter(t => (t.type||'').toLowerCase() === tp.toLowerCase());
    const tpL = countBy(tpTxs, isLease), tpS = countBy(tpTxs, isSale);
    const tpB = countBy(tpTxs, isBOV),  tpR = countBy(tpTxs, isRefFee);
    const tpTotal = tpL + tpS + tpB + tpR;
    summaryHtml += `<tr><td>${tp}</td><td>${tpL||'—'}</td><td>${tpS||'—'}</td><td>${tpB||'—'}</td><td>${tpR||'—'}</td><td>${tpTotal}</td></tr>`;
  }
  summaryHtml += `<tr style="font-weight:700;background:var(--navy);color:#fff"><td>TOTAL</td><td>${leases}</td><td>${sales}</td><td>${bovs||'—'}</td><td>${refs||'—'}</td><td>${knownTotal}</td></tr></tbody>`;
  document.getElementById('tx-summary').innerHTML = summaryHtml;

  // ── BROKER PERF CARDS
  const tiers = getTiers().sort((a,b)=>a.upTo-b.upTo);
  const maxTier = tiers[tiers.length-2]?.upTo || 275000;
  let cardsHtml = '';
  const sortedBrokers = state.brokers
    .filter(b => b.active)
    .map(b => ({ broker: b, stats: getBrokerYtdStats(b.id, year) }))
    .sort((a, b) => b.stats.ytdGross - a.stats.ytdGross);
  for (const { broker, stats } of sortedBrokers) {
    const pendCount = state.transactions.filter(tx => getTxBrokerIds(tx).includes(broker.id) && tx.payments.some(p=>p.status==='pending')).length;
    const tierLabel = getCurrentTierLabel(stats.ytdGross);
    const nextThresh = getNextTierThreshold(stats.ytdGross);
    const pct = nextThresh ? Math.min(100, (stats.ytdGross / nextThresh) * 100) : 100;
    const toNext = nextThresh ? fmtD(nextThresh - stats.ytdGross) + ' to next tier' : 'Top tier reached';
    const tierClass = tierLabel.startsWith('80') ? 'tier-80' : tierLabel.startsWith('70') ? 'tier-70' : '';
    cardsHtml += `

        <div class="progress-label">${fmtD(stats.ytdGross)} YTD · ${toNext}</div>

        </div>
      </div>`;
  }
  document.getElementById('broker-cards').innerHTML = cardsHtml || '<p class="text-muted">No active brokers.</p>';

  // ── MONTHLY TABLE
  const activeBrokers = state.brokers.filter(b => b.active || Object.values(brokerMonthly).some((_,bid)=>bid===b.id));
  const brokersWithData = state.brokers.filter(b => brokerMonthly[b.id]);
  let thHtml = '<thead><tr><th>Broker</th>';
  for (let m=0; m<12; m++) thHtml += `<th class="${m===curMonth?'cur-month-hdr':''}">${MONTHS_SHORT[m]}${m===curMonth?' ★':''}</th>`;
  thHtml += '<th>YTD Total</th></tr></thead>';

  let tbodyHtml = '<tbody>';
  for (const b of brokersWithData) {
    const months = brokerMonthly[b.id] || Array(12).fill(0);
    const ytd = months.reduce((s,v)=>s+v,0);
    if (ytd === 0) continue;
    tbodyHtml += `<tr><td><strong>${esc(b.name)}</strong></td>`;
    for (let m=0; m<12; m++) {
      const isTop = topProducer[m] === b.id;
      tbodyHtml += `<td class="${isTop?'top-cell':''}">${months[m]>0?fmtD(months[m]):'—'}</td>`;
    }

  }
  tbodyHtml += '</tbody>';
  let tfootHtml = '<tfoot><tr><td>Monthly Total</td>';
  for (let m=0; m<12; m++) tfootHtml += `<td>${monthlyTotals[m]>0?fmtD(monthlyTotals[m]):'—'}</td>`;
  tfootHtml += `<td>${fmtD(ytdGrossRec)}</td></tr></tfoot>`;
  document.getElementById('monthly-table').innerHTML = thHtml + tbodyHtml + tfootHtml;

  // ── CHARTS
  setTimeout(() => {

    if (cMonth) _chartInstances['monthly'] = new Chart(cMonth, { type:'line', data:{ labels:MONTHS_SHORT, datasets:[{label:'Gross Received',data:monthlyTotals,borderColor:'#C8102E',backgroundColor:'rgba(200,16,46,.1)',fill:true,tension:.3,pointBackgroundColor:'#C8102E'}]}, options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}});

    const brokerLabels = brokersWithData.map(b=>b.name);
    const brokerGrossData = brokersWithData.map(b=>getBrokerYtdStats(b.id,year).ytdGross);
    const cBroker = document.getElementById('chart-broker-gross');
    if (cBroker) _chartInstances['brokerGross'] = new Chart(cBroker, {type:'bar',data:{labels:brokerLabels,datasets:[{label:'Gross Commissions',data:brokerGrossData,backgroundColor:chartColors}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}});

    const companyData = brokersWithData.map(b=>getBrokerYtdStats(b.id,year).ytdCompanyNet);
    const cCompany = document.getElementById('chart-company-pie');
    if (cCompany) _chartInstances['companyPie'] = new Chart(cCompany, {type:'pie',data:{labels:brokerLabels,datasets:[{data:companyData,backgroundColor:chartColors}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});

    const brokerNetData = brokersWithData.map(b=>getBrokerYtdStats(b.id,year).ytdBrokerNet);
    const cBPie = document.getElementById('chart-broker-pie');
    if (cBPie) _chartInstances['brokerPie'] = new Chart(cBPie, {type:'pie',data:{labels:brokerLabels,datasets:[{data:brokerNetData,backgroundColor:chartColors}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});

    const typeData = types.map(tp => {
      let tot = 0;
      for (const tx of state.transactions) {
        if ((tx.type||'').toLowerCase()!==tp.toLowerCase()) continue;
        for (const pmt of tx.payments) {
          if (pmt.status==='received'&&fiscalYearOf(pmt.receivedDate)===year) tot+=pmt.amount;
        }
      }
      return tot;
    });
    const cType = document.getElementById('chart-type-pie');
    if (cType) _chartInstances['typePie'] = new Chart(cType,{type:'pie',data:{labels:types,datasets:[{data:typeData,backgroundColor:chartColors}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
  }, 100);
}

function getAvailableYears() {
  const years = new Set([new Date().getFullYear()]);
  for (const tx of state.transactions) {
    if (tx.fiscalYear) years.add(tx.fiscalYear);
    for (const pmt of tx.payments) {
      const y = fiscalYearOf(pmt.receivedDate);
      if (y) years.add(y);
    }
  }
  return [...years].sort((a,b)=>b-a);
}

let _txFilter = { search:'', broker:'', status:'', leaseSale:'' };

function renderTransactions(mc) {
  const year = state.settings.fiscalYear || new Date().getFullYear();
  const brokerOpts = state.brokers.map(b=>`<option value="${b.id}" ${_txFilter.broker===b.id?'selected':''}>${esc(b.name)}</option>`).join('');
  const statusOrder = {pending:0,partial:1,complete:2};

  let txs = [...state.transactions].sort((a,b)=>{
    const sa = statusOrder[getTxStatus(a)]??3;
    const sb = statusOrder[getTxStatus(b)]??3;
    if (sa!==sb) return sa-sb;
    return (a.createdAt||'').localeCompare(b.createdAt||'');
  });

  const q = (_txFilter.search||'').toLowerCase();
  if (q) txs = txs.filter(t => {
    const bLabel = getTxBrokerLabel(t).toLowerCase();
    return (t.propertyAddress||'').toLowerCase().includes(q) ||
           (t.clientName||'').toLowerCase().includes(q) ||
           bLabel.includes(q);
  });
  if (_txFilter.broker) txs = txs.filter(t => getTxBrokerIds(t).includes(_txFilter.broker));
  if (_txFilter.status) txs = txs.filter(t => getTxStatus(t) === _txFilter.status);
  if (_txFilter.leaseSale === '__untyped__') txs = txs.filter(t => {
    const v = (t.leaseSale||'').toLowerCase();
    return !v.includes('lease') && !v.includes('sale') && v !== 'bov' && v !== 'referral fee';
  });
  else if (_txFilter.leaseSale) txs = txs.filter(t => (t.leaseSale||'').toLowerCase() === _txFilter.leaseSale.toLowerCase());

  mc.innerHTML = `
  <div class="page-header">
    <div class="page-title">Transactions</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="openImportModal()">⬆ Import Excel</button>
      <button class="btn btn-primary btn-sm" onclick="openAddTxModal()">+ Add Transaction</button>
    </div>
  </div>
  <div class="filter-bar">
    <input class="search-input" id="tx-search" type="text" placeholder="Search address, client, broker…" value="${esc(_txFilter.search)}" oninput="txSearch(this)">
    <select onchange="_txFilter.broker=this.value;renderPage()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
      <option value="">All Brokers</option>${brokerOpts}
    </select>
    <select onchange="_txFilter.status=this.value;renderPage()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
      <option value="" ${!_txFilter.status?'selected':''}>All Statuses</option>
      <option value="pending" ${_txFilter.status==='pending'?'selected':''}>Pending</option>
      <option value="partial" ${_txFilter.status==='partial'?'selected':''}>Partial</option>
      <option value="complete" ${_txFilter.status==='complete'?'selected':''}>Complete</option>
    </select>
    ${(()=>{ const untypedCount = state.transactions.filter(t=>{const v=(t.leaseSale||'').toLowerCase();return !v.includes('lease')&&!v.includes('sale')&&v!=='bov'&&v!=='referral fee';}).length; return untypedCount>0?`<select onchange="_txFilter.leaseSale=this.value;renderPage()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;border-color:${_txFilter.leaseSale==='__untyped__'?'var(--red)':'var(--border)'}"><option value="" ${!_txFilter.leaseSale?'selected':''}>All Types</option><option value="Lease" ${_txFilter.leaseSale==='Lease'?'selected':''}>Lease</option><option value="Sale" ${_txFilter.leaseSale==='Sale'?'selected':''}>Sale</option><option value="BOV" ${_txFilter.leaseSale==='BOV'?'selected':''}>BOV</option><option value="Referral Fee" ${_txFilter.leaseSale==='Referral Fee'?'selected':''}>Referral Fee</option><option value="__untyped__" ${_txFilter.leaseSale==='__untyped__'?'selected':''}>⚠ Untyped (${untypedCount})</option></select>`:'';})()}
    <span style="font-size:12px;color:var(--muted)">${txs.length} transaction${txs.length!==1?'s':''}</span>
  </div>
  <div class="card">
    <div class="table-wrap-sticky">
      <table>
        <thead>
          <tr>
            <th style="width:32px"></th>
            <th>Property Address</th>
            <th>Broker</th>
            <th class="td-mono">TX Value</th>
            <th class="td-mono">Gross Comm</th>
            <th class="td-mono">Broker Net</th>
            <th class="td-mono">Received</th>
            <th class="td-mono">Pending AR</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tx-tbody">${buildTxRows(txs)}</tbody>
      </table>
    </div>
  </div>`;
}

function txSearch(input) {
  _searchFocusPending = true;
  _searchCursor = input.selectionStart;
  _txFilter.search = input.value;
  renderPage();
}

function buildTxRows(txs) {
  if (!txs.length) return '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--muted)">No transactions found.</td></tr>';
  let html = '';
  const year = state.settings.fiscalYear || new Date().getFullYear();

  for (const tx of txs) {
    const status = getTxStatus(tx);
    const badgeCls = `badge-${status}`;
    const brokerLabel = getTxBrokerLabel(tx);
    const isTeam = tx.team && tx.team.length > 0;
    const pendingPmts = tx.payments.filter(p=>p.status==='pending');
    const recPmts     = tx.payments.filter(p=>p.status==='received');
    const pendingAR   = pendingPmts.reduce((s,p)=>s+p.amount,0);
    const received    = recPmts.reduce((s,p)=>s+p.amount,0);

    // Broker net: calc using running YTD for each broker
    let brokerNetTotal = 0;
    const brokerIds = getTxBrokerIds(tx);
    for (const bid of brokerIds) {
      for (const pmt of recPmts) {
        let share = 1;
        if (isTeam) { const m=tx.team.find(mm=>mm.brokerId===bid); share=m?m.pct/100:0; }
        const ytd = getBrokerRunningYtd(bid, fiscalYearOf(pmt.receivedDate)||year, pmt.id);
        brokerNetTotal += calcSplit(ytd, pmt.amount*share, getBrokerOverridePct(bid)).brokerAmount;
      }
    }

    html += `
      <tr>
        <td><button class="expand-btn" data-expanded="0" data-txid="${tx.id}" onclick="toggleTxRow(this,'${tx.id}')">▸</button></td>
        <td><strong>${esc(tx.propertyAddress||'—')}</strong>${tx.notes?`<div style="font-size:11px;color:var(--muted)">${esc(tx.notes.slice(0,60))}</div>`:''}</td>
        <td>${esc(brokerLabel)}${isTeam?`<span class="team-tag">🤝${tx.team.length}</span>`:''}</td>
        <td class="td-mono">${fmtD(tx.transactionValue)}</td>
        <td class="td-mono">${fmtD(tx.totalCommission)}</td>
        <td class="td-mono" style="color:var(--success)">${received>0?fmtD(brokerNetTotal):'—'}</td>
        <td class="td-mono">${received>0?fmtD(received):'—'}</td>
        <td class="td-mono" style="color:${pendingAR>0?'var(--danger)':'var(--muted)'}">${pendingAR>0?fmtD(pendingAR):'—'}</td>
        <td><span class="badge ${badgeCls}">${status.charAt(0).toUpperCase()+status.slice(1)}</span></td>
        <td>
          <div style="display:flex;gap:4px">
            ${pendingPmts.length>0?`<button class="btn btn-success btn-xs" onclick="openMarkReceivedModal('${tx.id}')">✓ Mark Received</button>`:''}
            <button class="btn-icon" onclick="openEditTxModal('${tx.id}')" title="Edit">✏️</button>
            <button class="btn-icon" onclick="deleteTx('${tx.id}')" title="Delete">🗑️</button>
          </div>
        </td>
      </tr>`;

    // Sub-rows (hidden by default)
    html += buildSubRows(tx, isTeam);
  }
  return html;
}

function buildSubRows(tx, isTeam) {
  const year = state.settings.fiscalYear || new Date().getFullYear();
  const brokerIds = getTxBrokerIds(tx);
  let html = '';

  // Header
  if (isTeam) {
    html += `<tr class="sub-row sub-${tx.id} hidden sub-header"><td></td><td colspan="9"><em>Broker · Share · Gross · Broker Net · Company Net · Split · Status · Date</em></td></tr>`;
  } else {
    html += `<tr class="sub-row sub-${tx.id} hidden sub-header"><td></td><td colspan="9"><em>Amount (Gross) · Broker Net · Company Net · Split % · Status · Date</em></td></tr>`;
  }

  for (const pmt of tx.payments) {
    const pmtYear = fiscalYearOf(pmt.receivedDate) || year;
    const isRec = pmt.status === 'received';

    if (isTeam) {
      for (const member of tx.team) {
        const broker = state.brokers.find(b=>b.id===member.brokerId);
        const share = member.pct / 100;
        const gross = pmt.amount * share;
        const ytd = isRec ? getBrokerRunningYtd(member.brokerId, pmtYear, pmt.id) : 0;
        const split = calcSplit(ytd, gross, getBrokerOverridePct(member.brokerId));
        const bn = isRec ? split.brokerAmount : null;
        const cn = isRec ? split.companyAmount : null;
        html += `<tr class="sub-row sub-${tx.id} hidden">
          <td></td>
          <td><strong>${esc(broker?.name||'?')}</strong></td>
          <td colspan="2">${member.pct}% · ${fmtD(gross)}</td>
          <td class="td-mono" style="color:${isRec?'var(--success)':'var(--muted)'}">${isRec?fmtD(bn):`<em style="color:var(--muted)">~${fmtD(split.brokerAmount)}</em>`}</td>
          <td class="td-mono">${isRec?fmtD(cn):'—'}</td>
          <td><span class="tag">${isRec?split.effectiveSplit:'~'+split.effectiveSplit}</span></td>
          <td><span class="badge ${isRec?'badge-complete':'badge-pending'}">${isRec?'Received':'Pending'}</span></td>
          <td colspan="2">${isRec?fmtDate(pmt.receivedDate):'—'}</td>
        </tr>`;
      }
    } else {
      const bid = tx.brokerId || (brokerIds[0]||'');
      const ytd = isRec ? getBrokerRunningYtd(bid, pmtYear, pmt.id) : 0;
      const split = calcSplit(ytd, pmt.amount, getBrokerOverridePct(bid));
      const bn = isRec ? split.brokerAmount : null;
      html += `<tr class="sub-row sub-${tx.id} hidden">
        <td></td>
        <td colspan="2">${fmtD(pmt.amount)}</td>
        <td class="td-mono" style="color:${isRec?'var(--success)':'var(--muted)'}">${isRec?fmtD(bn):`<em style="color:var(--muted)">~${fmtD(split.brokerAmount)}</em>`}</td>
        <td class="td-mono">${isRec?fmtD(split.companyAmount):'—'}</td>
        <td><span class="tag">${isRec?split.effectiveSplit:'~'+split.effectiveSplit}</span></td>
        <td><span class="badge ${isRec?'badge-complete':'badge-pending'}">${isRec?'Received':'Pending'}</span></td>
        <td colspan="3">${isRec?fmtDate(pmt.receivedDate):'—'}</td>
      </tr>`;
    }
  }
  return html;
}

function toggleTxRow(btn, txId) {
  const expanded = btn.dataset.expanded === '1';
  btn.dataset.expanded = expanded ? '0' : '1';
  btn.textContent = expanded ? '▸' : '▾';
  document.querySelectorAll('.sub-' + txId).forEach(r => r.classList.toggle('hidden', expanded));
}

// ── MARK RECEIVED MODAL
function openMarkReceivedModal(txId) {
  const tx = state.transactions.find(t=>t.id===txId);
  if (!tx) return;
  const pending = tx.payments.filter(p=>p.status==='pending');
  if (!pending.length) { alert('No pending payments.'); return; }
  const year = state.settings.fiscalYear || new Date().getFullYear();
  const brokerIds = getTxBrokerIds(tx);
  const isTeam = tx.team && tx.team.length > 0;

  let opts = pending.map((p,i)=>`<option value="${p.id}">Payment #${i+1} — ${fmtD(p.amount)}</option>`).join('');
  openModal('Mark Payment Received', `
    <div class="form-group"><label>Payment</label><select id="mr-pmt" onchange="updateMrCalc('${txId}')">${opts}</select></div>
    <div class="form-row cols-2">
      <div class="form-group"><label>Amount Received</label><input type="number" id="mr-amount" step="0.01" placeholder="0.00" oninput="updateMrCalc('${txId}')"></div>
      <div class="form-group"><label>Date Received</label><input type="date" id="mr-date" value="${todayISO()}"></div>
    </div>
    <div class="form-group"><label>Notes (optional)</label><input type="text" id="mr-notes" placeholder="Optional note"></div>
    <div id="mr-calc" style="margin:12px 0;padding:12px;background:#f8fafc;border-radius:var(--radius);font-size:13px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="saveMarkReceived('${txId}')">Save</button>
    </div>`);
  updateMrCalc(txId);
}

function updateMrCalc(txId) {
  const tx = state.transactions.find(t=>t.id===txId);
  if (!tx) return;
  const pmtId = document.getElementById('mr-pmt')?.value;
  const pmt = tx.payments.find(p=>p.id===pmtId);
  const amtInput = document.getElementById('mr-amount');
  const amount = parseFloat(amtInput?.value) || pmt?.amount || 0;
  if (!amtInput?.value && pmt) amtInput.value = pmt.amount;
  const dateStr = document.getElementById('mr-date')?.value || todayISO();
  const pmtYear = fiscalYearOf(dateStr) || (state.settings.fiscalYear||new Date().getFullYear());
  const isTeam = tx.team && tx.team.length > 0;
  const brokerIds = getTxBrokerIds(tx);
  let calcHtml = '';
  for (const bid of brokerIds) {
    const broker = state.brokers.find(b=>b.id===bid);
    let share = 1;
    if (isTeam) { const m=tx.team.find(mm=>mm.brokerId===bid); share=m?m.pct/100:0; }
    const gross = amount * share;
    const ytd = getBrokerRunningYtd(bid, pmtYear, pmtId);
    const split = calcSplit(ytd, gross, getBrokerOverridePct(bid));
    calcHtml += `<div style="margin-bottom:6px"><strong>${esc(broker?.name||'?')}</strong>${isTeam?` (${Math.round(share*100)}%)`:''}:
      Gross ${fmtD(gross)} → Broker Net <strong style="color:var(--success)">${fmtD(split.brokerAmount)}</strong> · Company ${fmtD(split.companyAmount)} · Split <span class="tag">${split.effectiveSplit}</span></div>`;
  }
  const el = document.getElementById('mr-calc');
  if (el) el.innerHTML = calcHtml || 'Enter an amount to see calculation.';
}

async function saveMarkReceived(txId) {
  const tx = state.transactions.find(t=>t.id===txId);
  if (!tx) return;
  const pmtId   = document.getElementById('mr-pmt').value;
  const amount  = parseFloat(document.getElementById('mr-amount').value);
  const dateStr = document.getElementById('mr-date').value;
  const notes   = document.getElementById('mr-notes').value;
  if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }
  if (!dateStr) { alert('Please enter a date.'); return; }

  const pmt = tx.payments.find(p=>p.id===pmtId);
  if (!pmt) return;
  const pmtYear = fiscalYearOf(dateStr)||(state.settings.fiscalYear||new Date().getFullYear());
  const isTeam = tx.team && tx.team.length > 0;
  const brokerIds = getTxBrokerIds(tx);
  let brokerNet=0, companyNet=0, effectiveSplit='';
  for (const bid of brokerIds) {
    let share=1;
    if (isTeam){const m=tx.team.find(mm=>mm.brokerId===bid);share=m?m.pct/100:0;}
    const gross=amount*share;
    const ytd=getBrokerRunningYtd(bid,pmtYear,pmtId);
    const split=calcSplit(ytd,gross,getBrokerOverridePct(bid));
    brokerNet+=split.brokerAmount; companyNet+=split.companyAmount; effectiveSplit=split.effectiveSplit;
  }
  pmt.status='received'; pmt.amount=amount; pmt.receivedDate=dateStr; pmt.notes=notes;
  pmt.brokerNet=brokerNet; pmt.companyNet=companyNet; pmt.effectiveSplit=effectiveSplit;
  tx.lastEditedBy=state.currentUser; tx.lastEditedAt=new Date().toISOString();
  closeModal();
  await saveToGist();
  renderPage();
}

function openEditTxModal(txId) {

  if (!tx) return;

    ${txFormHtml(brokerOpts, tx)}

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>

async function saveNewTx() {
  const brokerId = document.getElementById('tf-broker').value;
  const address  = document.getElementById('tf-address').value.trim();
  if (!address) { alert('Property address is required.'); return; }
  const pendAmt  = parseFloat(document.getElementById('tf-pending').value)||0;
  const payments = pendAmt > 0 ? [{id:makeId(),status:'pending',amount:pendAmt}] : [];
  const tx = {
    id: makeId(), brokerId,
    propertyAddress: address,
    clientName: document.getElementById('tf-client').value.trim(),
    fiscalYear: parseInt(document.getElementById('tf-year').value)||new Date().getFullYear(),
    type: document.getElementById('tf-type').value,
    leaseSale: document.getElementById('tf-lease-sale').value,
    useType: document.getElementById('tf-use').value,
    transactionValue: parseFloat(document.getElementById('tf-tv').value)||0,
    totalCommission: parseFloat(document.getElementById('tf-comm').value)||0,
    sqFtg: parseFloat(document.getElementById('tf-sqft').value)||null,
    contractDate: document.getElementById('tf-contract').value,
    closingDate: document.getElementById('tf-closing').value,
    notes: document.getElementById('tf-notes').value,
    team: [], payments,
    importedPendingAR: false,
    createdAt: new Date().toISOString(),
    lastEditedBy: state.currentUser, lastEditedAt: new Date().toISOString(),
  };
  state.transactions.push(tx);
  closeModal();
  await saveToGist();
  renderPage();
}

async function saveEditTx(txId) {
  const tx = state.transactions.find(t=>t.id===txId);
  if (!tx) return;
  tx.brokerId = document.getElementById('tf-broker').value;
  tx.propertyAddress = document.getElementById('tf-address').value.trim();
  tx.clientName = document.getElementById('tf-client').value.trim();
  tx.fiscalYear = parseInt(document.getElementById('tf-year').value)||tx.fiscalYear;
  tx.type = document.getElementById('tf-type').value;
  tx.leaseSale = document.getElementById('tf-lease-sale').value;
  tx.useType = document.getElementById('tf-use').value;
  tx.transactionValue = parseFloat(document.getElementById('tf-tv').value)||0;
  tx.totalCommission  = parseFloat(document.getElementById('tf-comm').value)||0;
  tx.sqFtg  = parseFloat(document.getElementById('tf-sqft').value)||null;
  tx.contractDate = document.getElementById('tf-contract').value;
  tx.closingDate  = document.getElementById('tf-closing').value;
  tx.notes = document.getElementById('tf-notes').value;
  tx.lastEditedBy = state.currentUser; tx.lastEditedAt = new Date().toISOString();
  closeModal();
  await saveToGist();
  renderPage();
}

async function deleteTx(txId) {
  if (!confirm('Delete this transaction? This cannot be undone.')) return;
  state.transactions = state.transactions.filter(t=>t.id!==txId);
  await saveToGist();
  renderPage();
}

if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function handlePdfDrop(evt) {
  evt.preventDefault();
  document.getElementById('pdf-drop')?.classList.remove('drag-over');
  const file = evt.dataTransfer?.files?.[0];
  if (file?.type === 'application/pdf') handlePdfFile(file);
  else alert('Please drop a PDF file.');
}

async function handlePdfFile(file) {
  if (!file) return;
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let fullText = '';
    for (let i=1; i<=pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(it=>it.str).join(' ') + '\n';
    }
    const parsed = parsePdfText(fullText);
    fillTxFormFromPdf(parsed);
  } catch(e) {
    console.error('PDF parse error:', e);
    alert('Could not parse PDF. Please fill in the form manually.');
  }
}

function parsePdfText(text) {
  const result = {};
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const all = text;

  // Detect form type
  if (/LEASE Transaction Reporting Form/i.test(all)) result.formType = 'lease';
  else if (/SALE Transaction Reporting Form/i.test(all)) result.formType = 'sale';
  else if (/BOV/i.test(all)) result.formType = 'bov';

  function extractAfter(label, src) {
    const re = new RegExp(label + '[:\\s]+([^\\n]+)', 'i');
    const m = src.match(re);
    return m ? m[1].trim() : '';
  }

  // Property address (For Lauren section has Address/City)
  const addrMatch = all.match(/Address:\s*([^\n]+)/i);
  if (addrMatch) result.address = addrMatch[1].trim();
  const cityMatch = all.match(/City,?\s*State,?\s*Zip[:\s]*([^\n]+)/i);
  if (cityMatch) result.cityStateZip = cityMatch[1].trim();
  if (result.address && result.cityStateZip) result.propertyAddress = result.address + ', ' + result.cityStateZip;

  // Property type
  for (const t of ['Retail','Office','Industrial','Land','Special Purpose']) {
    if (new RegExp('\\b' + t + '\\b','i').test(all)) { result.type = t; break; }
  }

  // Transaction type / use type
  if (/Investment\s+Sale/i.test(all)) result.useType = 'Investment';
  else if (/End\s+User/i.test(all)) result.useType = 'User';

  // Lease or sale
  result.leaseSale = result.formType === 'lease' ? 'Lease' : 'Sale';

  // Numeric fields
  const tv = all.match(/Transaction\s+Value[:\s]+[\$]?([\d,]+\.?\d*)/i);
  if (tv) result.transactionValue = parseFloat(tv[1].replace(/,/g,''));
  const comm = all.match(/Commission\s+to\s+NAI[:\s]+[\$]?([\d,]+\.?\d*)/i) ||
               all.match(/Expected\s+Fee\s+to\s+NAI\s+Red[:\s]+[\$]?([\d,]+\.?\d*)/i);
  if (comm) result.totalCommission = parseFloat(comm[1].replace(/,/g,''));
  const sf = all.match(/Total\s+SF\s*[\/&]\s*Acres[:\s]+([\d,]+)/i);
  if (sf) result.sqFtg = parseFloat(sf[1].replace(/,/g,''));

  // Client
  if (result.formType === 'lease') {
    const t = all.match(/Tenant[:\s]+([^\n]+)/i);
    if (t) result.clientName = t[1].trim();
  } else {
    const b = all.match(/Buyer[:\s]+([^\n]+)/i);
    if (b) result.clientName = b[1].trim();
  }

  // Dates
  const lease = all.match(/Lease\s+Date[:\s]+([^\n]+)/i);
  if (lease) result.contractDate = lease[1].trim();
  const close = all.match(/Closing\s+Date[:\s]+([^\n]+)/i);
  if (close) result.closingDate = close[1].trim();
  const comm2 = all.match(/Commencement\s+Date[:\s]+([^\n]+)/i);
  if (comm2) result.closingDate = comm2[1].trim();

  // Team brokers (Name lines with % — Team section, NOT For Lauren)
  const teamMatches = [...all.matchAll(/Name[:\s]+([A-Za-z &,.']+?)\s+([\d.]+)\s*%\s*[\$]?([\d,]+\.?\d*)/g)];
  result.team = [];
  for (const m of teamMatches) {
    const name = m[1].trim();
    if (/for\s+lauren|for\s+office/i.test(name)) continue;
    const pct = parseFloat(m[2]);
    result.team.push({ name, pct });
  }

  // BOV: agents
  if (result.formType === 'bov') {
    const agents = all.match(/Agent[s\)]*[:\s]+([^\n]+)/i);
    if (agents) result.clientName = agents[1].trim(); // agents go to broker lookup
  }

  return result;
}

function fillTxFormFromPdf(parsed) {
  if (parsed.propertyAddress) { const el=document.getElementById('tf-address'); if(el) el.value=parsed.propertyAddress; }
  if (parsed.clientName) { const el=document.getElementById('tf-client'); if(el) el.value=parsed.clientName; }
  if (parsed.type) { const el=document.getElementById('tf-type'); if(el) el.value=parsed.type; }
  if (parsed.leaseSale) { const el=document.getElementById('tf-lease-sale'); if(el) el.value=parsed.leaseSale; }
  if (parsed.useType) { const el=document.getElementById('tf-use'); if(el) el.value=parsed.useType; }
  if (parsed.transactionValue) { const el=document.getElementById('tf-tv'); if(el) el.value=parsed.transactionValue; }
  if (parsed.totalCommission) { const el=document.getElementById('tf-comm'); if(el) el.value=parsed.totalCommission; if(!document.getElementById('tf-pending').value) document.getElementById('tf-pending').value=parsed.totalCommission; }
  if (parsed.sqFtg) { const el=document.getElementById('tf-sqft'); if(el) el.value=parsed.sqFtg; }

  // Try to match broker from team
  if (parsed.team && parsed.team.length > 0) {
    for (const member of parsed.team) {
      const broker = resolveBrokerName(member.name);
      if (broker) { const el=document.getElementById('tf-broker'); if(el) el.value=broker.id; break; }
    }
  }

  // Show a notification
  const drop = document.getElementById('pdf-drop');
  if (drop) drop.innerHTML = '<div style="color:var(--success)">✅ PDF parsed — review fields below and save.</div>';
}
