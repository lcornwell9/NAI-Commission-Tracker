function openImportModal() {
  openModal('Import Excel Spreadsheet', `
    <div class="alert alert-info">Import from your 2026 NAI Red Transactions spreadsheet. Columns are auto-detected from headers.</div>
    <div class="form-group">
      <label>Import Mode</label>
      <select id="import-mode">
        <option value="full">Full Year — update matching properties, keep others</option>
        <option value="replace">Replace All — wipe all existing transactions first (fresh import)</option>
        <option value="pending">Pending AR Only — import only outstanding AR (col Q negative)</option>
      </select>
    </div>
    <div class="form-group"><label>Select Excel File</label><input type="file" id="import-file" accept=".xlsx,.xls"></div>
    <div id="import-preview"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="runImport()">Preview Import</button>
    </div>`);
}

async function runImport() {
  const file = document.getElementById('import-file')?.files?.[0];
  if (!file) { alert('Please select a file.'); return; }
  const mode = document.getElementById('import-mode')?.value || 'full';
  const buf = await file.arrayBuffer();
  const wb  = XLSX.read(buf, {type:'array', cellDates:false});
  // Find Transactions sheet
  const sheetName = wb.SheetNames.find(n => /transaction/i.test(n)) || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

  // Find header row
  let headerRow = -1;
  for (let i=0; i<Math.min(rows.length,10); i++) {
    const r = rows[i];
    if (r && r.some(c => /associate|property address|broker/i.test(String(c||'')))) { headerRow=i; break; }
  }
  if (headerRow < 0) { alert('Could not find header row. Please check the spreadsheet.'); return; }

  // Build column map
  const headers = rows[headerRow];
  const col = {};
  headers.forEach((h,i) => { if (h) col[String(h).toLowerCase().trim()] = i; });

  // Normalize spreadsheet lease/sale values to canonical "Lease" or "Sale"
  function normalizeLeaseSale(raw) {
    const v = String(raw||'').trim().toLowerCase();
    if (!v) return '';
    if (v === 'l' || v.includes('lease') || v.includes('renewal') || v.includes('extension') || v.includes('sublease') || v.includes('assignment')) return 'Lease';
    if (v === 's' || v.includes('sale') || v.includes('purchase') || v.includes('acquisition')) return 'Sale';
    if (v.includes('bov') || v.includes('broker opinion')) return 'BOV';
    if (v.includes('referral') || v.includes('ref fee') || v.includes('ref. fee')) return 'Referral Fee';
    return String(raw).trim();
  }

  // Column indices
  const C_BROKER   = col['associate'] ?? 0;
  const C_PROP     = col['property address'] ?? 1;
  const C_CLIENT   = col['buyer / seller'] ?? col['buyer/seller'] ?? 2;
  const C_TYPE     = col['type'] ?? 3;
  const C_LEASE    = col['lease/sale'] ?? col['lease / sale'] ?? 4;
  const C_USE      = col['use type'] ?? 5;
  const C_SQFT     = col['sq. ftg.'] ?? col['sq ftg'] ?? 6;
  const C_TV       = col['transaction value'] ?? 8;
  const C_COMMDUE  = col['gross commission due'] ?? 10;
  const C_OS       = Object.keys(col).find(k=>k.includes('outstanding')) !== undefined ? col[Object.keys(col).find(k=>k.includes('outstanding'))] : 16;
  const C_CONTRACT = col['contract date'] ?? 17;
  const C_CLOSE    = col['closing date'] ?? 18;
  const C_PREV     = Object.keys(col).find(k=>k.includes('previously')) !== undefined ? col[Object.keys(col).find(k=>k.includes('previously'))] : 19;
  const C_NOTES    = col['notes'] ?? 33;
  const C_MONTHS   = Array.from({length:12}, (_,m) => {
    const mn=['january','february','march','april','may','june','july','august','september','october','november','december'];
    const found = Object.keys(col).find(k=>k.includes(mn[m]));
    return found ? col[found] : (21+m);
  });

  // Detect year from filename or sheet name
  let detectedYear = new Date().getFullYear();
  const yearMatch = (file.name + sheetName).match(/20\d{2}/);
  if (yearMatch) detectedYear = parseInt(yearMatch[0]);

  function excelDateToISO(v, year) {
    if (!v) return null;
    if (typeof v === 'number') {
      const d = new Date((v - 25569) * 86400000);
      return d.toISOString().slice(0,10);
    }
    const s = String(v).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s);
    if (!isNaN(d)) return d.toISOString().slice(0,10);
    return null;
  }

  const dataRows = rows.slice(headerRow+1).filter(r => r && r[C_PROP] && String(r[C_PROP]).trim());

  if (mode === 'pending') {
    // Pending-only import
    const pending = dataRows.filter(row => (parseFloat(row[C_OS])||0) < -1.0);
    const incomingProps = new Set(pending.map(r=>String(r[C_PROP]||'').trim().toLowerCase()));

    // Remove existing imported AR for these properties
    state.transactions = state.transactions.filter(t =>
      !t.importedPendingAR || !incomingProps.has((t.propertyAddress||'').toLowerCase())
    );

    const newTxs = [];
    for (const row of pending) {
      const arAmt = Math.abs(parseFloat(row[C_OS]));
      const brokerRaw = String(row[C_BROKER]||'').trim();
      let brokerObj = resolveBrokerName(brokerRaw);
      if (!brokerObj && brokerRaw) {
        const capName = brokerRaw.charAt(0).toUpperCase() + brokerRaw.slice(1).toLowerCase();
        brokerObj = state.brokers.find(b=>b.name.toLowerCase()===brokerRaw.toLowerCase());
        if (!brokerObj) {
          brokerObj={id:makeId(),name:capName,email:'',phone:'',active:false,createdAt:new Date().toISOString()};
          state.brokers.push(brokerObj);
        }
      }
      let contractDate=null, closingDate=null;
      try{contractDate=excelDateToISO(row[C_CONTRACT],detectedYear);}catch(e){}
      try{closingDate=excelDateToISO(row[C_CLOSE],detectedYear);}catch(e){}
      newTxs.push({
        id:makeId(), brokerId:brokerObj?.id||null, importedPendingAR:true,
        propertyAddress:String(row[C_PROP]||'').trim(),
        clientName:String(row[C_CLIENT]||'').trim(),
        type:String(row[C_TYPE]||''), leaseSale:normalizeLeaseSale(row[C_LEASE]),
        useType:String(row[C_USE]||''), sqFtg:parseFloat(row[C_SQFT])||null,
        transactionValue:Math.abs(parseFloat(row[C_TV])||0),
        totalCommission:Math.abs(parseFloat(row[C_COMMDUE])||0),
        contractDate:contractDate||'', closingDate:closingDate||'',
        notes:String(row[C_NOTES]||''), fiscalYear:detectedYear, team:[],
        payments:[{id:makeId(),status:'pending',amount:arAmt}],
        createdAt:new Date().toISOString(), lastEditedBy:'Import', lastEditedAt:new Date().toISOString(),
      });
    }
    showImportPreview(newTxs, mode, detectedYear, async ()=>{
      state.transactions.push(...newTxs);
      await saveToGist();
      closeModal();
      renderPage();
    });

  } else {
    // Full year import — group by property+client
    const groups = {};
    for (const row of dataRows) {
      const prop  = String(row[C_PROP]||'').trim();
      const buyer = String(row[C_CLIENT]||'').trim();
      const key   = prop + '|||' + buyer;
      if (!groups[key]) {
        let contractDate=null, closingDate=null;
        try{contractDate=excelDateToISO(row[C_CONTRACT],detectedYear);}catch(e){}
        try{closingDate=excelDateToISO(row[C_CLOSE],detectedYear);}catch(e){}
        groups[key] = {
          property:prop, buyerSeller:buyer,
          type:String(row[C_TYPE]||''), leaseSale:normalizeLeaseSale(row[C_LEASE]),
          useType:String(row[C_USE]||''), sqFtg:parseFloat(row[C_SQFT])||null,
          transactionValue:parseFloat(row[C_TV])||0,
          grossCommDue:parseFloat(row[C_COMMDUE])||0,
          contractDate, closingDate,
          notes:String(row[C_NOTES]||''),
          outstanding:0, brokerRows:[],
        };
      }
      const arRaw = parseFloat(row[C_OS])||0;
      if (arRaw < -1.0) groups[key].outstanding += Math.abs(arRaw);
      groups[key].brokerRows.push(row);
    }

    // Replace All mode: wipe everything first
    if (mode === 'replace') {
      state.transactions = [];
      state.brokers = state.brokers.filter(b => b.active); // keep broker records, clear transactions
    }
    // Collect incoming property addresses to wipe (for Full Year mode)
    const incomingProps = new Set(Object.values(groups).map(g=>g.property.toLowerCase()));
    if (mode !== 'replace') {
      state.transactions = state.transactions.filter(t =>
        !t.importedPendingAR && !incomingProps.has((t.propertyAddress||'').toLowerCase())
      );
    }

    const newTxs = [];
    for (const g of Object.values(groups)) {
      // Determine brokers (team) from rows
      const team = [];
      // Build aligned row↔broker pairs first (before any filtering), then derive brokersInGroup
      const rowBrokerMap = g.brokerRows.map(row => {
        const raw = String(row[C_BROKER]||'').trim();
        let obj = resolveBrokerName(raw);
        if (!obj && raw) {
          // Case-insensitive search first to avoid creating duplicates
          obj = state.brokers.find(b=>b.name.toLowerCase()===raw.toLowerCase());
          if (!obj) { obj={id:makeId(),name:raw.trim(),email:'',active:false,createdAt:new Date().toISOString()}; state.brokers.push(obj); }
        }
        return {row, broker: obj};
      });
      const validPairs = rowBrokerMap.filter(p=>p.broker);
      const brokersInGroup = validPairs.map(p=>p.broker);

      // Primary broker
      const primaryBroker = brokersInGroup[0];
      const brokerId = primaryBroker?.id || null;
      const isTeamDeal = brokersInGroup.length > 1;

      // If multiple brokers, derive split % from each broker's actual V-AG + Col T amounts
      if (isTeamDeal) {
        const brokerTotals = validPairs.map(p => {
          let t = Math.abs(parseFloat(p.row[C_PREV])||0);
          for (let mi=0;mi<12;mi++) t+=Math.abs(parseFloat(p.row[C_MONTHS[mi]])||0);
          return t;
        });
        const grandTotal = brokerTotals.reduce((s,a)=>s+a,0);
        if (grandTotal > 0) {
          let sumPct = 0;
          brokersInGroup.forEach((b,i) => {
            const pct = i===brokersInGroup.length-1
              ? parseFloat((100-sumPct).toFixed(4))
              : parseFloat((brokerTotals[i]/grandTotal*100).toFixed(4));
            team.push({brokerId:b.id, pct});
            sumPct += pct;
          });
        } else {
          // Fallback to equal split if no amounts found
          const pctEach = Math.round(100/brokersInGroup.length);
          brokersInGroup.forEach((b,i)=>team.push({brokerId:b.id,pct:i===0?100-(pctEach*(brokersInGroup.length-1)):pctEach}));
        }
      }

      // Payments
      const payments = [];

      // Previously received (col T) — sum across all broker rows in this group
      const prevBrokerAmts = validPairs
        .map(p=>({brokerId:p.broker.id, amount:Math.abs(parseFloat(p.row[C_PREV])||0)}))
        .filter(ba=>ba.amount>0);
      const prevAmt = prevBrokerAmts.reduce((s,ba)=>s+ba.amount,0);
      if (prevAmt > 0) {
        payments.push({id:makeId(),status:'received',amount:prevAmt,
          receivedDate:`${detectedYear-1}-12-31`,
          notes:'Previously received (pre-'+detectedYear+')',
          brokerAmounts: isTeamDeal ? prevBrokerAmts : undefined});
      }

      // Monthly (cols V-AG) — store total + per-broker breakdown for exact reconciliation
      for (let m=0; m<12; m++) {
        // Use validPairs to keep row↔broker indices aligned; filter $0 entries but keep array for team deals
        const brokerAmounts = validPairs
          .map(p=>({brokerId:p.broker.id, amount:Math.abs(parseFloat(p.row[C_MONTHS[m]])||0)}))
          .filter(ba=>ba.amount>0);
        const monthAmt = brokerAmounts.reduce((s,ba)=>s+ba.amount,0);
        if (monthAmt > 0) {
          // For team deals, ALWAYS store brokerAmounts so reconciliation gets exact per-broker amounts
          // (not just when >1 broker paid — months where only one broker is paid still need tagging)
          payments.push({id:makeId(),status:'received',amount:monthAmt,
            receivedDate:lastDayOfMonth(detectedYear,m+1),
            brokerAmounts: isTeamDeal ? brokerAmounts : undefined});
        }
      }

      // Pending AR — store per-broker amounts so they match each broker's Col Q directly
      for (const p of validPairs) {
        const arRaw = parseFloat(p.row[C_OS])||0;
        if (arRaw < -1.0) {
          payments.push({
            id:makeId(), status:'pending', amount:Math.abs(arRaw),
            brokerId: p.broker.id,
            notes:'Pending AR'
          });
        }
      }

      newTxs.push({
        id:makeId(), brokerId, team,
        propertyAddress:g.property, clientName:g.buyerSeller,
        type:g.type, leaseSale:g.leaseSale, useType:g.useType, sqFtg:g.sqFtg,
        transactionValue:g.transactionValue, totalCommission:g.grossCommDue,
        contractDate:g.contractDate||'', closingDate:g.closingDate||'',
        notes:g.notes, fiscalYear:detectedYear, importedPendingAR:false,
        payments, createdAt:new Date().toISOString(),
        lastEditedBy:'Import', lastEditedAt:new Date().toISOString(),
      });
    }

    showImportPreview(newTxs, mode, detectedYear, async ()=>{
      state.transactions.push(...newTxs);
      await saveToGist();
      closeModal();
      renderPage();
    });
  }
}

function showImportPreview(newTxs, mode, year, onConfirm) {
  const recCount = newTxs.reduce((s,t)=>s+t.payments.filter(p=>p.status==='received').length,0);
  const pendCount = newTxs.reduce((s,t)=>s+t.payments.filter(p=>p.status==='pending').length,0);
  const recTotal  = newTxs.reduce((s,t)=>s+t.payments.filter(p=>p.status==='received').reduce((a,p)=>a+p.amount,0),0);
  const pendTotal = newTxs.reduce((s,t)=>s+t.payments.filter(p=>p.status==='pending').reduce((a,p)=>a+p.amount,0),0);

  const previewRows = newTxs.slice(0,10).map(t=>`<tr><td>${esc(t.propertyAddress)}</td><td>${esc(getTxBrokerLabel(t))}</td><td>${t.payments.filter(p=>p.status==='received').length} rcvd / ${t.payments.filter(p=>p.status==='pending').length} pend</td></tr>`).join('');
  document.getElementById('import-preview').innerHTML = `
    <div class="alert alert-info" style="margin-top:14px">
      <strong>Preview: ${newTxs.length} transactions</strong> for ${year} (${mode} mode)<br>
      ${recCount} received payments totaling ${fmtD(recTotal)} · ${pendCount} pending totaling ${fmtD(pendTotal)}
    </div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:12px">
      <table><thead><tr><th>Property</th><th>Broker</th><th>Payments</th></tr></thead>
      <tbody>${previewRows}${newTxs.length>10?`<tr><td colspan="3" style="color:var(--muted);text-align:center">…and ${newTxs.length-10} more</td></tr>`:''}</tbody></table>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('import-preview').innerHTML=''">Cancel</button>
      <button class="btn btn-primary" onclick="confirmImport()">Confirm Import</button>
    </div>`;
  window._pendingImportConfirm = onConfirm;
}

async function confirmImport() { if (window._pendingImportConfirm) await window._pendingImportConfirm(); }

function renderBrokers(mc) {
  const year = state.settings.fiscalYear || new Date().getFullYear();
  const rows = state.brokers.map(b => {
    const stats = getBrokerYtdStats(b.id, year);
    const tierLabel = getCurrentTierLabel(stats.ytdGross);
    const txCount = state.transactions.filter(tx => getTxBrokerIds(tx).includes(b.id)).length;
    const canDelete = txCount === 0;
    return `<tr>
      <td><strong>${esc(b.name)}</strong><div class="edited-meta">${b.createdAt ? 'Added ' + fmtDate(b.createdAt.slice(0,10)) : ''}</div></td>
      <td class="td-mono">${fmtD(stats.ytdGross)}</td>
      <td>${b.customSplitPct != null ? `<span class="tier-badge" style="background:#7c3aed;color:#fff">${b.customSplitPct}/${100-b.customSplitPct} Custom</span>` : `<span class="tier-badge">${tierLabel}</span>`}</td>
      <td class="td-mono" style="color:var(--success)">${fmtD(stats.ytdBrokerNet)}</td>
      <td class="td-mono">${fmtD(stats.ytdCompanyNet)}</td>
      <td class="td-mono" style="color:${stats.pendingAR>0?'var(--danger)':'var(--muted)'}">${stats.pendingAR>0?fmtD(stats.pendingAR):'—'}</td>
      <td><span class="badge ${b.active?'badge-active':'badge-inactive'}">${b.active?'Active':'Inactive'}</span></td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn-icon" onclick="openEditBrokerModal('${b.id}')" title="Edit">✏️</button>
          <button class="btn-icon" onclick="toggleBrokerActive('${b.id}')" title="${b.active?'Deactivate':'Activate'}">${b.active?'⏸':'▶'}</button>
          ${canDelete?`<button class="btn-icon" onclick="deleteBroker('${b.id}')" title="Delete">🗑️</button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');

  mc.innerHTML = `
  <div class="page-header">
    <div class="page-title">Brokers</div>

async function saveNewBroker() {
  const name = document.getElementById('br-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const customSplitRaw = document.getElementById('br-custom-split')?.value.trim();
  const customSplitPct = customSplitRaw !== '' ? parseFloat(customSplitRaw) : null;
  const broker = { id:makeId(), name, active: document.getElementById('br-active').value==='1', createdAt:new Date().toISOString() };
  if (customSplitPct != null && !isNaN(customSplitPct)) broker.customSplitPct = customSplitPct;
  state.brokers.push(broker);
  closeModal(); await saveToGist(); renderPage();
}

async function saveEditBroker(id) {
  const b = state.brokers.find(b=>b.id===id);
  if (!b) return;
  b.name   = document.getElementById('br-name').value.trim();
  b.active = document.getElementById('br-active').value === '1';
  const customSplitRaw = document.getElementById('br-custom-split')?.value.trim();
  if (customSplitRaw !== '' && customSplitRaw != null) {
    b.customSplitPct = parseFloat(customSplitRaw);
  } else {
    delete b.customSplitPct;
  }
  closeModal(); await saveToGist(); renderPage();
}

async function toggleBrokerActive(id) {
  const b = state.brokers.find(b=>b.id===id);
  if (b) { b.active = !b.active; await saveToGist(); renderPage(); }
}

async function deleteBroker(id) {
  const txCount = state.transactions.filter(tx=>getTxBrokerIds(tx).includes(id)).length;
  if (txCount > 0) { alert('Cannot delete a broker with transactions.'); return; }
  if (!confirm('Delete this broker?')) return;
  state.brokers = state.brokers.filter(b=>b.id!==id);
  await saveToGist(); renderPage();
}

// ── BROKER AUDIT REPORT
function generateBrokerAudit() {
  const brokerId = document.getElementById('r1-broker').value;
  const year     = parseInt(document.getElementById('r1-year').value) || state.settings.fiscalYear;
  const brokers  = brokerId ? state.brokers.filter(b=>b.id===brokerId) : state.brokers;

  let tableRows = '';
  let totTV=0, totGrossComm=0, totGrossRec=0, totBrokerPaid=0, totPendAR=0;

  for (const broker of brokers) {
    const brokerRunYtd = {};
    for (const tx of state.transactions) {
      const brokerIds = getTxBrokerIds(tx);
      if (!brokerIds.includes(broker.id)) continue;

      let share = 1;
      if (tx.team && tx.team.length > 0) {
        const m = tx.team.find(mm=>mm.brokerId===broker.id);
        share = m ? m.pct/100 : 0;
      }

      const recPmts  = tx.payments.filter(p=>p.status==='received' && fiscalYearOf(p.receivedDate)===year);
      const pendPmts = tx.payments.filter(p=>p.status==='pending');
      const grossComm = (tx.totalCommission||0) * share;
      const grossRec  = recPmts.reduce((s,p)=>s+p.amount*share,0);
      const pendAR    = pendPmts.reduce((s,p)=>s+p.amount,0);

      if (recPmts.length === 0 && pendPmts.length === 0) continue;

      // Broker net using running YTD
      let brokerPaid = 0;
      for (const pmt of recPmts) {
        const pmtYear = fiscalYearOf(pmt.receivedDate)||year;
        const ytd = getBrokerRunningYtd(broker.id, pmtYear, pmt.id);
        brokerPaid += calcSplit(ytd, pmt.amount*share, getBrokerOverridePct(broker.id)).brokerAmount;
      }

      // Effective split
      const effSplit = grossRec > 0 ? getCurrentTierLabel(getBrokerRunningYtd(broker.id, year, null)) : '—';

      totTV       += (tx.transactionValue||0)*share;
      totGrossComm += grossComm;
      totGrossRec  += grossRec;
      totBrokerPaid += brokerPaid;
      totPendAR    += pendAR;

      tableRows += `<tr>
        <td>${esc(tx.propertyAddress||'—')}</td>
        <td>${esc(tx.clientName||'—')}</td>
        <td class="td-mono">${fmtD((tx.transactionValue||0)*share)}</td>
        <td class="td-mono">${fmtD(grossComm)}</td>
        <td class="td-mono">${fmtD(grossRec)}</td>
        <td><span class="tag">${effSplit}</span></td>
        <td class="td-mono" style="color:var(--success)">${brokerPaid>0?fmtD(brokerPaid):'—'}</td>
        <td class="td-mono" style="color:${pendAR>0?'var(--danger)':'var(--muted)'}">${pendAR>0?fmtD(pendAR):'—'}</td>
      </tr>`;
    }
  }

  const brokerLabel = brokerId ? (state.brokers.find(b=>b.id===brokerId)?.name||'') : 'All Brokers';
  document.getElementById('r1-output').innerHTML = tableRows ? `
    <div class="card" style="padding:0;margin-top:14px">
      <div class="report-header">
        <h2>Broker Audit — ${year}</h2>
        <p>${state.settings.companyName} · ${brokerLabel}</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Property Address</th><th>Buyer/Seller</th>
            <th class="td-mono">TX Value</th><th class="td-mono">Gross Comm Due</th>
            <th class="td-mono">Gross Received</th><th>Split</th>
            <th class="td-mono">Broker Paid</th><th class="td-mono">Pending AR</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
          <tfoot><tr style="background:var(--navy);color:#fff;font-weight:700">
            <td colspan="2">TOTAL</td>
            <td class="td-mono">${fmtD(totTV)}</td>
            <td class="td-mono">${fmtD(totGrossComm)}</td>
            <td class="td-mono">${fmtD(totGrossRec)}</td>
            <td></td>
            <td class="td-mono">${fmtD(totBrokerPaid)}</td>
            <td class="td-mono">${fmtD(totPendAR)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>` : '<div class="alert alert-warning" style="margin-top:12px">No transactions found for the selected filters.</div>';
}

// ── PROPERTY TYPE REPORT
function generateTypeReport() {
  const year   = parseInt(document.getElementById('r2-year').value) || state.settings.fiscalYear;
  const period = document.getElementById('r2-period').value;
  const QM = {Q1:[1,2,3],Q2:[4,5,6],Q3:[7,8,9],Q4:[10,11,12]};
  const types = ['Retail','Industrial','Office','Special Purpose','Land'];

  function inPeriod(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr+'T12:00:00');
    if (d.getFullYear()!==year) return false;
    if (period) { const m=d.getMonth()+1; return (QM[period]||[]).includes(m); }
    return true;
  }

  // Summary matrix
  const summary = {};
  for (const tp of types) summary[tp] = {leases:0,sales:0,tv:0,grossDue:0,grossRec:0,pendAR:0};
  const detail = [];

  const seen = new Set();
  for (const tx of state.transactions) {
    const tp = tx.type || 'Other';
    if (!summary[tp]) continue;
    const ls = (tx.leaseSale||'').toLowerCase();

    const recPmts  = tx.payments.filter(p=>p.status==='received' && inPeriod(p.receivedDate));
    const pendPmts = tx.payments.filter(p=>p.status==='pending');
    const grossRec = recPmts.reduce((s,p)=>s+p.amount,0);
    const pendAR   = pendPmts.reduce((s,p)=>s+p.amount,0);

    if (recPmts.length===0 && pendPmts.length===0) continue;

    if (!seen.has(tx.id)) {
      seen.add(tx.id);
      if (ls.includes('lease')) summary[tp].leases++;
      else if (ls.includes('sale')) summary[tp].sales++;
      summary[tp].tv      += tx.transactionValue||0;
      summary[tp].grossDue += tx.totalCommission||0;
    }
    summary[tp].grossRec += grossRec;
    summary[tp].pendAR   += pendAR;

    detail.push({ address:tx.propertyAddress||'—', type:tx.type||'—', leaseSale:tx.leaseSale||'—', sqFtg:tx.sqFtg, tv:tx.transactionValue||0, grossDue:tx.totalCommission||0 });
  }

  // Build summary table
  let sumRows='', totTV=0,totDue=0,totRec=0,totAR=0,totLeases=0,totSales=0;
  for (const tp of types) {
    const s=summary[tp];
    sumRows+=`<tr><td><strong>${tp}</strong></td><td>${s.leases}</td><td>${s.sales}</td><td class="td-mono">${fmtD(s.tv)}</td><td class="td-mono">${fmtD(s.grossDue)}</td><td class="td-mono">${fmtD(s.grossRec)}</td><td class="td-mono" style="color:var(--warning)">${s.pendAR>0?fmtD(s.pendAR):'—'}</td></tr>`;
    totTV+=s.tv;totDue+=s.grossDue;totRec+=s.grossRec;totAR+=s.pendAR;totLeases+=s.leases;totSales+=s.sales;
  }

  // Detail list
  const detailRows = detail.sort((a,b)=>(a.type+a.address).localeCompare(b.type+b.address))
    .map(r=>`<tr><td>${esc(r.address)}</td><td>${esc(r.type)}</td><td>${esc(r.leaseSale)}</td><td class="td-mono">${r.sqFtg?r.sqFtg.toLocaleString():'—'}</td><td class="td-mono">${fmtD(r.tv)}</td><td class="td-mono">${fmtD(r.grossDue)}</td></tr>`).join('');

  const periodLabel = period || 'Full Year';
  document.getElementById('r2-output').innerHTML = `
    <div class="card" style="padding:0;margin-top:14px">
      <div class="report-header">
        <h2>Property Type Report — ${year} ${periodLabel}</h2>
        <p>${state.settings.companyName} · All Brokers</p>
      </div>
      <div style="padding:14px 0 0;font-weight:600;font-size:13px;padding-left:18px;color:var(--navy)">Summary</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Type</th><th>Leases</th><th>Sales</th><th class="td-mono">TX Value</th><th class="td-mono">Gross Comm Due</th><th class="td-mono">Gross Received</th><th class="td-mono">Pending AR</th></tr></thead>
          <tbody>${sumRows}</tbody>
          <tfoot><tr style="background:var(--navy);color:#fff;font-weight:700">
            <td>TOTAL</td><td>${totLeases}</td><td>${totSales}</td>
            <td class="td-mono">${fmtD(totTV)}</td><td class="td-mono">${fmtD(totDue)}</td>
            <td class="td-mono">${fmtD(totRec)}</td><td class="td-mono">${fmtD(totAR)}</td>
          </tr></tfoot>
        </table>
      </div>
      <div style="padding:14px 0 0;font-weight:600;font-size:13px;padding-left:18px;color:var(--navy)">Transaction Detail</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Property Address</th><th>Type</th><th>Lease/Sale</th><th class="td-mono">Size (Sq Ft)</th><th class="td-mono">TX Value</th><th class="td-mono">Gross Comm Due</th></tr></thead>
          <tbody>${detailRows||'<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">No transactions.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

// ── RECONCILIATION
async function runReconciliation() {
  const file = document.getElementById('recon-file')?.files?.[0];
  if (!file) { alert('Please select a file.'); return; }
  const buf = await file.arrayBuffer();
  const wb  = XLSX.read(buf,{type:'array',defval:null});
  const sheetName = wb.SheetNames.find(n=>/transaction/i.test(n))||wb.SheetNames[0];
  const ws  = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

  let headerRow=-1;
  for (let i=0;i<Math.min(rows.length,10);i++){
    if(rows[i]?.some(c=>/associate|property address/i.test(String(c||'')))){headerRow=i;break;}
  }
  if(headerRow<0){document.getElementById('r3-output').innerHTML='<div class="alert alert-danger">Could not find header row.</div>';return;}

  const headers=rows[headerRow];
  const col={};
  headers.forEach((h,i)=>{if(h)col[String(h).toLowerCase().trim()]=i;});
  const C_BROKER=col['associate']??0;
  const C_OS=Object.keys(col).find(k=>k.includes('outstanding'))!==undefined?col[Object.keys(col).find(k=>k.includes('outstanding'))]:16;
  const C_PREV=Object.keys(col).find(k=>k.includes('previously'))!==undefined?col[Object.keys(col).find(k=>k.includes('previously'))]:19;
  const C_MONTHS=Array.from({length:12},(_,m)=>{
    const mn=['january','february','march','april','may','june','july','august','september','october','november','december'];
    const found=Object.keys(col).find(k=>k.includes(mn[m]));
    return found?col[found]:(21+m);
  });

  // Sheet totals per broker
  const sheet={};
  for(const row of rows.slice(headerRow+1)){
    if(!row||!row[C_BROKER])continue;
    const raw=String(row[C_BROKER]||'').trim();
    const broker=resolveBrokerName(raw);
    const name=broker?.name||raw;
    if(!name)continue;
    if(!sheet[name])sheet[name]={ar:0,prev:0,ytd:0};
    const arRaw=parseFloat(row[C_OS])||0;
    if(arRaw<-1)sheet[name].ar+=Math.abs(arRaw);
    sheet[name].prev+=Math.abs(parseFloat(row[C_PREV])||0);
    for(let m=0;m<12;m++)sheet[name].ytd+=Math.abs(parseFloat(row[C_MONTHS[m]])||0);
  }

  // Tracker totals per broker
  const tracker={};
  const year=parseInt((document.getElementById('r2-year')||{}).value)||state.settings.fiscalYear||new Date().getFullYear();
  for(const b of state.brokers){
    let ar=0,prev=0,ytd=0;
    for(const tx of state.transactions){
      if(!getTxBrokerIds(tx).includes(b.id))continue;
      // Apply broker's team share so amounts match their individual spreadsheet rows
      let share=1;
      if(tx.team&&tx.team.length>0){
        const m=tx.team.find(mm=>mm.brokerId===b.id);
        share=m?m.pct/100:0;
      }
      if(share===0)continue;
      for(const pmt of tx.payments){
        if(pmt.status==='pending'){
          // Per-broker tagged: only count if it belongs to this broker
          if(pmt.brokerId) { if(pmt.brokerId===b.id) ar+=pmt.amount; }
          else ar+=pmt.amount*share; // legacy untagged: apply share
        }
        if(pmt.status==='received'){
          const pmtYear=fiscalYearOf(pmt.receivedDate);
          // Use exact per-broker amount if available, otherwise fall back to share%
          let amt;
          if (pmt.brokerAmounts) {
            const ba = pmt.brokerAmounts.find(ba=>ba.brokerId===b.id);
            amt = ba !== undefined ? ba.amount : 0; // broker absent from brokerAmounts = $0 that period
          } else {
            amt = pmt.amount * share;
          }
          if(!pmtYear||pmtYear<year)prev+=amt;
          else if(pmtYear===year)ytd+=amt;
        }
      }
    }
    tracker[b.name]={ar,prev,ytd};
  }

  const EPS=0.10;
  const match=(a,b)=>Math.abs(a-b)<=EPS;
  const allNames=new Set([...Object.keys(sheet),...Object.keys(tracker)]);
  let tableRows='',hasAnyMiss=false;
  for(const name of [...allNames].sort()){
    const s=sheet[name]||{ar:0,prev:0,ytd:0};
    const t=tracker[name]||{ar:0,prev:0,ytd:0};
    const arOk=match(s.ar,t.ar),prevOk=match(s.prev,t.prev),ytdOk=match(s.ytd,t.ytd);
    const anyMiss=!arOk||!prevOk||!ytdOk;
    if(anyMiss)hasAnyMiss=true;
    tableRows+=`<tr class="${anyMiss?'recon-row-miss':''}">
      <td><strong>${esc(name)}</strong></td>
      <td class="td-mono">${fmtD(t.ar)}</td><td class="td-mono">${fmtD(s.ar)}</td>
      <td class="${arOk?'reconcile-match':'reconcile-miss'}">${arOk?'✓':'✗'}</td>
      <td class="td-mono">${fmtD(t.prev)}</td><td class="td-mono">${fmtD(s.prev)}</td>
      <td class="${prevOk?'reconcile-match':'reconcile-miss'}">${prevOk?'✓':'✗'}</td>
      <td class="td-mono">${fmtD(t.ytd)}</td><td class="td-mono">${fmtD(s.ytd)}</td>
      <td class="${ytdOk?'reconcile-match':'reconcile-miss'}">${ytdOk?'✓':'✗'}</td>
    </tr>`;
  }

  document.getElementById('r3-output').innerHTML=`
    ${hasAnyMiss?'<div class="alert alert-warning">⚠️ Some brokers have mismatches (highlighted in red). Tolerance: ±$0.10</div>':'<div class="alert alert-success">✅ All broker totals match within tolerance.</div>'}
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Broker</th>
        <th class="td-mono">Tracker AR</th><th class="td-mono">Sheet AR</th><th>✓</th>
        <th class="td-mono">Tracker Prev</th><th class="td-mono">Sheet Prev</th><th>✓</th>
        <th class="td-mono">Tracker YTD</th><th class="td-mono">Sheet YTD</th><th>✓</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>`;
}

// ── EXCEL EXPORTS (Broker Audit)
async function downloadBrokerAuditXLSX() {
  const brokerId = document.getElementById('r1-broker').value;
  const year     = parseInt(document.getElementById('r1-year').value)||state.settings.fiscalYear;

  if(typeof ExcelJS==='undefined'){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  }

  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('Broker Audit');
  const NAVY='1a3a5c',RED='C8102E',WHITE='FFFFFF',GOLD='D4AF37';

  ws.mergeCells('A1:H1');
  const t1=ws.getCell('A1');
  t1.value=`${state.settings.companyName} — Broker Audit Report (${year})`;
  t1.font={bold:true,size:14,color:{argb:'FF'+WHITE}};
  t1.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};
  t1.alignment={horizontal:'center',vertical:'middle'};
  ws.getRow(1).height=28;

  const brokerLabel=brokerId?(state.brokers.find(b=>b.id===brokerId)?.name||'All Brokers'):'All Brokers';
  ws.mergeCells('A2:H2');
  const t2=ws.getCell('A2');
  t2.value=`Broker: ${brokerLabel}`;
  t2.font={size:11,color:{argb:'FF'+WHITE}};
  t2.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+RED}};
  t2.alignment={horizontal:'center',vertical:'middle'};
  ws.getRow(2).height=18;

  const hdr=['Property Address','Buyer/Seller','TX Value','Gross Comm Due','Gross Received','Split %','Broker Paid','Pending AR'];
  const hr=ws.addRow(hdr);
  hr.eachCell(c=>{c.font={bold:true,size:10,color:{argb:'FF'+WHITE}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};c.alignment={horizontal:'center',vertical:'middle'};});
  ws.getRow(3).height=20;
  [20,20,14,14,14,10,14,12].forEach((w,i)=>ws.getColumn(i+1).width=w);

  const brokers=brokerId?state.brokers.filter(b=>b.id===brokerId):state.brokers;
  let rowIdx=4,totTV=0,totDue=0,totRec=0,totBN=0,totAR=0;
  const currFmt='"$"#,##0.00';

  for(const broker of brokers){
    let firstForBroker=true;
    for(const tx of state.transactions){
      const brokerIds=getTxBrokerIds(tx);
      if(!brokerIds.includes(broker.id))continue;
      let share=1;
      if(tx.team&&tx.team.length>0){const m=tx.team.find(mm=>mm.brokerId===broker.id);share=m?m.pct/100:0;}
      const recPmts=tx.payments.filter(p=>p.status==='received'&&fiscalYearOf(p.receivedDate)===year);
      const pendPmts=tx.payments.filter(p=>p.status==='pending');
      if(recPmts.length===0&&pendPmts.length===0)continue;
      const grossRec=recPmts.reduce((s,p)=>s+p.amount*share,0);
      const pendAR=pendPmts.reduce((s,p)=>s+p.amount,0);
      let brokerPaid=0;
      for(const pmt of recPmts){const ytd=getBrokerRunningYtd(broker.id,fiscalYearOf(pmt.receivedDate)||year,pmt.id);brokerPaid+=calcSplit(ytd,pmt.amount*share,getBrokerOverridePct(broker.id)).brokerAmount;}
      const grossComm=(tx.totalCommission||0)*share;
      const effSplit=getCurrentTierLabel(getBrokerRunningYtd(broker.id,year,null));
      totTV+=(tx.transactionValue||0)*share;totDue+=grossComm;totRec+=grossRec;totBN+=brokerPaid;totAR+=pendAR;

      if(firstForBroker){
        // broker section header
        const bhr=ws.addRow([broker.name,'','','','','','','']);
        ws.mergeCells(`A${rowIdx}:H${rowIdx}`);
        bhr.getCell(1).font={bold:true,size:11,color:{argb:'FF'+WHITE}};
        bhr.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};
        ws.getRow(rowIdx).height=18;
        rowIdx++;firstForBroker=false;
      }

      const dr=ws.addRow([tx.propertyAddress||'',tx.clientName||'',(tx.transactionValue||0)*share,grossComm,grossRec,effSplit,brokerPaid,pendAR]);
      [3,4,5,7,8].forEach(c=>{dr.getCell(c).numFmt=currFmt;dr.getCell(c).alignment={horizontal:'right'};});
      dr.getCell(8).font={color:{argb:'FF'+RED}};
      const isEven=rowIdx%2===0;
      dr.eachCell({includeEmpty:true},cell=>{cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+(isEven?'F0F4F8':'FFFFFF')}};cell.font=cell.font||{size:10};});
      ws.getRow(rowIdx).height=16;rowIdx++;
    }
  }

  // Totals
  ws.addRow([]);rowIdx++;
  const tr=ws.addRow(['TOTAL','',totTV,totDue,totRec,'',totBN,totAR]);
  tr.eachCell({includeEmpty:true},c=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};c.font={bold:true,size:10,color:{argb:'FF'+WHITE}};});
  [3,4,5,7,8].forEach(c=>{tr.getCell(c).numFmt=currFmt;tr.getCell(c).alignment={horizontal:'right'};});

  ws.views=[{state:'frozen',ySplit:3}];
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`BrokerAudit_${brokerLabel.replace(/\s+/g,'_')}_${year}.xlsx`;a.click();
  URL.revokeObjectURL(url);
}

// ── EXCEL EXPORT (Property Type)
async function downloadTypeXLSX() {
  const year  =parseInt(document.getElementById('r2-year').value)||state.settings.fiscalYear;
  const period=document.getElementById('r2-period').value;
  const QM={Q1:[1,2,3],Q2:[4,5,6],Q3:[7,8,9],Q4:[10,11,12]};
  const types=['Retail','Industrial','Office','Special Purpose','Land'];

  if(typeof ExcelJS==='undefined'){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  }

  const wb=new ExcelJS.Workbook();
  const NAVY='1a3a5c',RED='C8102E',WHITE='FFFFFF';

  // Sheet 1: Detail
  const ws=wb.addWorksheet('Transaction Detail');
  ws.mergeCells('A1:F1');
  const t1=ws.getCell('A1');
  t1.value=`${state.settings.companyName} — Property Type Report (${year} ${period||'Full Year'})`;
  t1.font={bold:true,size:13,color:{argb:'FF'+WHITE}};
  t1.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};
  t1.alignment={horizontal:'center',vertical:'middle'};
  ws.getRow(1).height=26;

  const hdr=ws.addRow(['Property Address','Property Type','Lease or Sale','Size (Sq Ft)','Transaction Value','Gross Comm Due']);
  hdr.eachCell(c=>{c.font={bold:true,size:10,color:{argb:'FF'+WHITE}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};c.alignment={horizontal:'center'};});
  [30,16,12,12,16,16].forEach((w,i)=>ws.getColumn(i+1).width=w);
  const currFmt='"$"#,##0.00';

  const rows=[];
  const seen=new Set();
  for(const tx of state.transactions){
    if(seen.has(tx.id))continue;
    const recPmts=tx.payments.filter(p=>p.status==='received'&&inPeriod(p.receivedDate));
    const pendPmts=tx.payments.filter(p=>p.status==='pending');
    if(recPmts.length===0&&pendPmts.length===0)continue;
    seen.add(tx.id);
    rows.push({tp:tx.type||'Other',address:tx.propertyAddress||'',leaseSale:tx.leaseSale||'',sqFtg:tx.sqFtg||null,tv:tx.transactionValue||0,grossDue:tx.totalCommission||0});
  }
  rows.sort((a,b)=>(a.tp+a.address).localeCompare(b.tp+b.address));

  let lastTp=null,rowIdx=3;
  for(const r of rows){
    rowIdx++;
    if(r.tp!==lastTp){
      if(lastTp!==null){ws.addRow([]);rowIdx++;}
      const gr=ws.addRow([r.tp.toUpperCase(),'','','','','']);
      ws.mergeCells(`A${rowIdx}:F${rowIdx}`);
      gr.getCell(1).font={bold:true,size:11,color:{argb:'FF'+WHITE}};
      gr.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}};
      ws.getRow(rowIdx).height=18;
      rowIdx++;lastTp=r.tp;
    }
    const dr=ws.addRow([r.address,r.tp,r.leaseSale,r.sqFtg,r.tv,r.grossDue]);
    [4,5,6].forEach(c=>{if(dr.getCell(c).value!=null){dr.getCell(c).numFmt=c===4?'#,##0':currFmt;dr.getCell(c).alignment={horizontal:'right'};}});
    const isEven=rowIdx%2===0;
    dr.eachCell({includeEmpty:true},cell=>{cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+(isEven?'F0F4F8':'FFFFFF')}};});
    ws.getRow(rowIdx).height=16;
  }

  ws.views=[{state:'frozen',ySplit:2}];

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`PropertyTypeReport_${year}_${period||'FullYear'}.xlsx`;a.click();
  URL.revokeObjectURL(url);
}

async function mergeBrokers() {
  const fromId = document.getElementById('merge-from').value;
  const intoId = document.getElementById('merge-into').value;
  if (!fromId || !intoId || fromId === intoId) { alert('Please select two different brokers.'); return; }
  const fromB = state.brokers.find(b=>b.id===fromId);
  const intoB = state.brokers.find(b=>b.id===intoId);
  if (!fromB || !intoB) return;
  if (!confirm(`Merge "${fromB.name}" into "${intoB.name}"? All transactions from "${fromB.name}" will be reassigned to "${intoB.name}" and the duplicate will be removed.`)) return;

  // Re-point all transaction team/broker references from fromId → intoId
  for (const tx of state.transactions) {
    if (tx.brokerId === fromId) tx.brokerId = intoId;
    if (tx.team) tx.team.forEach(m => { if (m.brokerId === fromId) m.brokerId = intoId; });
    for (const pmt of (tx.payments||[])) {
      if (pmt.brokerId === fromId) pmt.brokerId = intoId;
      if (pmt.brokerAmounts) pmt.brokerAmounts.forEach(ba => { if (ba.brokerId === fromId) ba.brokerId = intoId; });
    }
  }
  // Remove the duplicate broker record
  state.brokers = state.brokers.filter(b => b.id !== fromId);
  await saveToGist();
  renderPage();
  alert(`Done — "${fromB.name}" merged into "${intoB.name}".`);
}

async function saveCloudSettings() {
  const token = document.getElementById('s-gist-token').value.trim();
  const binId = document.getElementById('s-gist-id').value.trim();
  const result = document.getElementById('cloud-test-result');
  if (!token || !binId) { result.textContent = 'Please enter both Master Key and Bin ID.'; result.style.color='var(--red)'; return; }
  result.textContent = 'Testing…'; result.style.color='var(--muted)';
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { 'X-Master-Key': token }
    });
    if (r.ok) {
      localStorage.setItem('ct-cloud-token',  token);
      localStorage.setItem('ct-cloud-gistid', binId);
      saveLocalCache();
      const saved = await saveToGist();
      if (saved && saved.ok) {
        result.textContent = '✓ Connected! Synced successfully.';
        result.style.color = 'var(--success)';
      } else {
        const code = saved ? saved.status : '?';
        const body = saved ? saved.body : '';
        result.textContent = `✗ Write failed (HTTP ${code}) — ${body || 'check Master Key and Bin ID'}`;
        result.style.color = 'var(--red)';
      }
    } else {
      result.textContent = `✗ Failed (${r.status}) — check your Master Key and Bin ID.`;
      result.style.color = 'var(--red)';
    }
  } catch(e) {
    result.textContent = '✗ Network error — check your connection.';
    result.style.color = 'var(--red)';
  }
}

function saveCompanySettings() {
  state.settings.companyName = document.getElementById('s-company').value.trim();
  state.settings.fiscalYear  = parseInt(document.getElementById('s-fiscal').value)||new Date().getFullYear();
  saveAndSync();
  showToast('Company settings saved.');
}

function saveTiers() {
  const inputs = document.querySelectorAll('.tier-broker');
  const tiers  = getTiers();
  let ok = true;
  inputs.forEach(inp => {
    const i    = parseInt(inp.dataset.i);
    const bPct = parseInt(inp.value)||0;
    if (bPct < 1 || bPct > 99) { ok=false; return; }
    tiers[i].brokerPct  = bPct/100;
    tiers[i].companyPct = (100-bPct)/100;
  });
  const upToInputs = document.querySelectorAll('.tier-upto');
  upToInputs.forEach(inp => {
    const i = parseInt(inp.dataset.i);
    tiers[i].upTo = parseInt(inp.value)||0;
  });
  if (!ok) { alert('Broker % must be between 1 and 99.'); return; }
  state.settings.tiers = tiers;
  saveAndSync();
  showToast('Split tiers saved.');
}

async function updatePassword(userName) {
  const input = document.getElementById('pw-'+userName.toLowerCase());
  const pw = input?.value?.trim();
  if (!pw) { alert('Please enter a new password.'); return; }
  const hash = await hashPass(pw);
  setLocalPasswordHash(userName, hash);
  input.value = '';
  showToast('Password updated for ' + userName + '.');
}

function renameBroker(bId, oldName) {
  const newName = prompt('Enter new name for broker:', oldName);
  if (!newName || !newName.trim()) return;
  const b = state.brokers.find(x=>x.id===bId);
  if (b) { b.name = newName.trim(); saveAndSync(); navigate('settings'); }
}

function addBrokerFromSettings() {
  const name   = document.getElementById('new-broker-name').value.trim();
  const active = document.getElementById('new-broker-active').value === 'true';
  if (!name) { alert('Please enter a name.'); return; }
  if (state.brokers.some(b=>b.name.toLowerCase()===name.toLowerCase())) {
    alert('A broker with that name already exists.'); return;
  }
  state.brokers.push({ id: genId(), name, active, createdAt: new Date().toISOString() });
  closeModal('add-broker-modal');
  saveAndSync();
  navigate('settings');
}

function exportBackup() {
  const json = JSON.stringify({ transactions: state.transactions, brokers: state.brokers, settings: state.settings }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `nai-tracker-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}

function restoreBackup(input) {
  const file = input.files[0]; if (!file) return;
  if (!confirm(`Restore from "${file.name}"? This will overwrite all current data.`)) { input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.transactions) state.transactions = data.transactions;
      if (data.brokers)      state.brokers      = data.brokers;
      if (data.settings)     state.settings     = data.settings;
      saveAndSync();
      document.getElementById('backup-status').textContent = `✅ Restored from ${file.name}`;
      navigate(state.currentPage);
    } catch(err) {
      alert('Invalid backup file: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}


function ensureBroker(resolvedName) {
  if (!resolvedName) return null;
  let b = state.brokers.find(x=>x.name===resolvedName);
  if (!b) {
    b = { id:genId(), name:resolvedName, active:false, createdAt:new Date().toISOString() };
    state.brokers.push(b);
  }
  return b;
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-'+type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('toast-visible'),10);
  setTimeout(()=>{ t.classList.remove('toast-visible'); setTimeout(()=>t.remove(),400); },2800);
}

function fmtD0(n){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0); }

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function closeAllModals() {
  document.querySelectorAll('.modal-backdrop').forEach(m=>{ m.style.display='none'; m.classList.remove('modal-open'); });
  const o=document.getElementById('modal-overlay'); if(o)o.style.display='none';
}

async function syncToGist() {
  // Legacy stub — actual sync handled by saveToGist() via JSONBin
  await saveToGist();
}

function saveAndSync() {
  saveLocalCache();
  saveToGist();
}

function loadLocalData() {
  try {
    const d = JSON.parse(localStorage.getItem('ct-data')||'{}');
    if (d.transactions) state.transactions = d.transactions;
    if (d.brokers)      state.brokers      = d.brokers;
    if (d.settings)     state.settings     = { ...state.settings, ...d.settings };
  } catch(e){}
}

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function completeLogin(user) {
  state.currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-user-name').textContent = user;
  navigate('dashboard');
}

async function init() {
  loadLocalData();
  const loginLogo = document.getElementById('login-logo');
  const navLogo   = document.getElementById('nav-logo');
  if (loginLogo) loginLogo.src = LOGO_BLACK_LOGIN;
  if (navLogo)   navLogo.src   = LOGO_WHITE_NAV;
  await loadFromGist();
  const DEFAULT_HASH = 'f11eacaff47d9b9659a10c57b2bb7490496ec6a179dd0114c8abf67146ca90ba';
  if (!getLocalPasswordHash('Lauren')) setLocalPasswordHash('Lauren', DEFAULT_HASH);
  if (!getLocalPasswordHash('David'))  setLocalPasswordHash('David',  DEFAULT_HASH);
  // Restore session if previously logged in (skip login screen on refresh)
  const savedUser = localStorage.getItem('ct-session');
  if (savedUser && (savedUser === 'Lauren' || savedUser === 'David')) {
    finishLogin(savedUser);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
}

window.addEventListener('DOMContentLoaded', init);

</script>
